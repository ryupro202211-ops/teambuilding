<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔒 朝ブリーフ</title>
<style>
:root{--bg:#f3f4f6;--card:#fff;--ink:#1f2937;--sub:#6b7280;--line:#e5e7eb;
--red:#dc2626;--redbg:#fef2f2;--org:#ea580c;--orgbg:#fff7ed;--grn:#16a34a;--yel:#ca8a04;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.7}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#4f46e5,#7c3aed 60%,#db2777);color:#fff;
border-radius:18px;padding:22px 22px 18px;box-shadow:0 8px 24px rgba(79,70,229,.25)}
.header h1{margin:0 0 2px;font-size:20px}
.header .date{opacity:.9;font-size:13px}
.hpwrap{margin:14px 0 6px}
.hpbar{height:20px;background:rgba(255,255,255,.28);border-radius:10px;overflow:hidden}
.hpfill{height:100%;border-radius:10px;transition:width .5s}
.hpfill.ok{background:#22c55e}.hpfill.warn{background:#eab308}.hpfill.bad{background:#ef4444}
.hpnote{font-size:11px;opacity:.9;margin-top:4px}
.quote{margin-top:12px;background:rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;font-size:14px}
.quote .src{display:block;margin-top:6px;font-size:12px;opacity:.85;text-align:right}
.card{background:var(--card);border-radius:16px;padding:16px 18px;margin:14px 0;
box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card h2{margin:0 0 10px;font-size:16px;display:flex;align-items:center;gap:6px}
.card.boss{background:#3b0d0d;color:#fee2e2}
.card.boss h2{color:#fecaca}
.bossemo{font-size:30px}
.alert-self{border-left:5px solid var(--red)}
.alert-mem{border-left:5px solid var(--org)}
ul.clean{list-style:none;margin:0;padding:0}
ul.clean li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line)}
ul.clean li:last-child{border-bottom:0}
label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
label.done .mtxt{text-decoration:line-through;color:var(--sub)}
label.done .memo{filter:grayscale(1);opacity:.35}
.memo{font-size:24px;width:30px;text-align:center;flex:none}
.lv{display:inline-block;background:#111827;color:#fff;font-size:12px;border-radius:6px;
padding:1px 6px;margin-right:4px;flex:none}
.mem .lv{background:var(--org)}
.mtxt{flex:1}
.mtxt .sub{display:block;font-size:12px;color:var(--sub);margin-top:2px}
.over{color:var(--red);font-weight:700}
.nlink{font-size:12px;color:#4f46e5;text-decoration:none;white-space:nowrap;flex:none;align-self:center}
.nlink:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--sub);font-weight:600;font-size:12px}
.badge{display:inline-block;border-radius:6px;padding:1px 7px;font-size:12px;font-weight:700;color:#fff}
.b-red{background:var(--red)}.b-yel{background:var(--yel)}.b-grn{background:var(--grn)}
.good{color:var(--grn);font-weight:700}
.prog{font-size:12px;color:var(--sub);margin-top:8px}
.komon{background:#eef2ff;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.8}
.src a{color:#4f46e5}
.src li{margin:3px 0}
h2 .cnt{font-size:12px;color:var(--sub);font-weight:400}

#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#4f46e5,#7c3aed 60%,#db2777);
display:flex;align-items:center;justify-content:center;z-index:99}
.gatebox{background:#fff;border-radius:16px;padding:26px;width:300px;max-width:88%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.gatebox h3{margin:0 0 14px;font-size:17px}
.gatebox input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:15px}
.gatebox button{margin-top:12px;width:100%;padding:10px;border:0;border-radius:8px;background:#4f46e5;color:#fff;font-size:15px;cursor:pointer}
.gerr{color:#dc2626;font-size:12px;margin-top:8px;min-height:14px}
</style>
</head>
<body>
<div id="lockgate">
  <div class="gatebox">
    <h3>🔒 朝ブリーフ</h3>
    <input id="pw" type="password" placeholder="パスフレーズ" autofocus>
    <button id="openbtn">開く</button>
    <div class="gerr" id="gerr"></div>
  </div>
</div>
<div class="wrap">
  <div class="header">
    <h1>🌅 りゅうちゃんの朝ブリーフ</h1>
    <div class="date">2026年7月22日（水）</div>
    <div class="hpwrap">
      <div class="hpbar"><div class="hpfill ok" id="hpfill" style="width:80%"></div></div>
      <div class="hpnote">HP <span id="hpval">80</span>/100 ・ 自分の期限切れ 0件 ×-10 ／ メンバー切れ 4件 ×-5 ／ 毎朝100にリセット</div>
    </div>
    <div class="quote">「一燈を提げて暗夜を行く。暗夜を憂うる勿れ。只だ一燈を頼め。」
      <span class="src">― 佐藤一斎『言志晩録』</span>
    </div>
  </div>
  <div id="content"></div>
</div>

const SKEY = "brief-2026-07-22";
function b2a(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0));}
function loadState(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}');}catch(e){return {};}}
function saveState(s){localStorage.setItem(SKEY,JSON.stringify(s));}
function refresh(){
  let self=0,mem=0;
  document.querySelectorAll('#content input[type=checkbox]').forEach(cb=>{
    const id=cb.getAttribute('data-id');
    if(cb.checked)return;
    if(id&&id.indexOf('self-')===0)self++;
    if(id&&id.indexOf('mem-')===0)mem++;
  });
  let hp=100-self*10-mem*5; if(hp<0)hp=0; if(hp>100)hp=100;
  const f=document.getElementById('hpfill'); const v=document.getElementById('hpval');
  if(f){f.style.width=hp+'%';f.className='hpfill '+(hp>=80?'ok':(hp>=50?'warn':'bad'));}
  if(v)v.textContent=hp;
  let remain=0;
  document.querySelectorAll('#content input[type=checkbox]').forEach(cb=>{if(!cb.checked)remain++;});
  const p=document.getElementById('prog');
  if(p)p.textContent=remain===0?'全部やりきった！':('残り '+remain+' 件');
}
function wire(){
  const st=loadState();
  document.querySelectorAll('#content input[type=checkbox]').forEach(cb=>{
    const id=cb.getAttribute('data-id');
    if(st[id]){cb.checked=true;const l=cb.closest('label');if(l)l.classList.add('done');}
    cb.addEventListener('change',()=>{
      const s=loadState();s[id]=cb.checked;saveState(s);
      const l=cb.closest('label');if(l)l.classList.toggle('done',cb.checked);
      refresh();
    });
  });
  const c=document.getElementById('content');
  if(c&&!document.getElementById('prog')){const d=document.createElement('div');d.id='prog';d.className='prog';d.style.textAlign='center';d.style.margin='4px 0 20px';c.appendChild(d);}
  refresh();
}
async function unlock(pw){
  const err=document.getElementById('gerr');
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(ENC.iv)},key,b2a(ENC.ct));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('openbtn').addEventListener('click',()=>unlock(document.getElementById('pw').value));
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(e.target.value);});
