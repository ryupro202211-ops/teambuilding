<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 朝ブリーフ</title>
<style>
  :root{--red:#e63946;--orange:#f4842d;--yellow:#f6c445;--green:#39b54a;--ink:#22252b;--muted:#6b7280;--card:#ffffff;--bg:#eef1f6;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;line-height:1.7;}
  .wrap{max-width:860px;margin:0 auto;padding:0 16px 60px;}
  header.hero{background:linear-gradient(135deg,#5b7cfa 0%,#8a5cf6 55%,#d86bd8 100%);color:#fff;padding:34px 28px;border-radius:0 0 26px 26px;box-shadow:0 8px 22px rgba(90,110,250,.28);}
  header.hero .date{font-size:14px;opacity:.92;letter-spacing:.04em;}
  header.hero h1{margin:6px 0 14px;font-size:26px;font-weight:800;}
  header.hero .quote{background:rgba(255,255,255,.16);border-radius:14px;padding:14px 16px;font-size:15px;}
  header.hero .quote small{display:block;margin-top:6px;opacity:.9;}
  .card{background:var(--card);border-radius:18px;padding:20px 22px;margin:20px 0;box-shadow:0 4px 14px rgba(20,30,60,.07);}
  .card h2{margin:0 0 14px;font-size:18px;display:flex;align-items:center;gap:8px;}
  .alertbox{border-radius:14px;padding:14px 16px;margin:12px 0;}
  .alert-self{background:#fdecec;border-left:6px solid var(--red);}
  .alert-mem{background:#fdf1e4;border-left:6px solid var(--orange);}
  .alertbox h3{margin:0 0 8px;font-size:15px;}
  .alert-self h3{color:var(--red);} .alert-mem h3{color:#c96a13;}
  ul{margin:6px 0;padding-left:20px;} li{margin:5px 0;}
  .over{color:var(--red);font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid #eef0f4;vertical-align:top;}
  th{background:#f5f7fb;font-weight:700;color:#414753;}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;}
  .b-red{background:var(--red);} .b-yellow{background:var(--yellow);color:#5b4600;} .b-green{background:var(--green);}
  .muted{color:var(--muted);font-size:13px;}
  .comment{background:#f0f7ff;border-left:6px solid #5b7cfa;border-radius:12px;padding:14px 16px;}
  a{color:#4a63d6;word-break:break-all;}
  .src li{font-size:13px;}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;}
</style>
<style>
  #lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#5b7cfa,#8a5cf6,#d86bd8);display:flex;align-items:center;justify-content:center;z-index:999;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;}
  #lockgate .box{background:#fff;padding:34px 30px;border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.25);width:min(90vw,360px);text-align:center;}
  #lockgate h2{margin:0 0 6px;font-size:20px;color:#22252b;}
  #lockgate p{margin:0 0 18px;color:#6b7280;font-size:13px;}
  #lockgate input{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid #d5d9e2;border-radius:10px;margin-bottom:12px;}
  #lockgate button{width:100%;padding:12px;font-size:16px;font-weight:700;color:#fff;background:#5b7cfa;border:none;border-radius:10px;cursor:pointer;}
  #lockgate button:hover{background:#4a63d6;}
  #lockerr{color:#e63946;font-size:13px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate">
  <div class="box">
    <h2>🔒 朝ブリーフ</h2>
    <p>パスフレーズを入力してください</p>
    <input id="pw" type="password" placeholder="パスフレーズ" autocomplete="off" />
    <button id="btn">開く</button>
    <div id="lockerr"></div>
  </div>
</div>

f1RD6yqYRn4tTQivqHPvl3TNH715xZrsHHxrTFoiqRmkKX8Ic9c9AoziX4wrg2Ucw","it":250000};
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('lockerr');
  err.textContent='';
  try{
    const salt=b64(ENC.salt), iv=b64(ENC.iv), data=b64(ENC.ct);
    const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ENC.it,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
  }catch(e){ err.textContent='パスフレーズが違います'; }
}
document.getElementById('btn').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
</body>
</html>
