<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">

<title>🔒 朝ブリーフ</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1f2733;--sub:#5b6470;--red:#d43c3c;--org:#e8820c;--grn:#2ea24a;--yel:#e0a900;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.6}
.wrap{max-width:820px;margin:0 auto;padding:16px}
.hero{background:linear-gradient(135deg,#3a6df0,#8a5cf6);color:#fff;border-radius:20px;padding:22px 24px;box-shadow:0 8px 24px rgba(60,80,180,.25)}
.hero .date{opacity:.9;font-size:14px}
.hero h1{margin:4px 0 14px;font-size:24px}
.hpbox{background:rgba(255,255,255,.16);border-radius:12px;padding:10px 12px}
.hplabel{font-weight:700;font-size:14px;margin-bottom:6px}
.hpbar{background:rgba(0,0,0,.18);border-radius:8px;height:16px;overflow:hidden}
.hpfill{height:100%;width:100%;border-radius:8px;transition:width .5s}
.hpfill.ok{background:#3ce07a}.hpfill.warn{background:#ffcc3d}.hpfill.bad{background:#ff5a5a}
.hpnote{font-size:11px;opacity:.85;margin-top:6px}
.quote{margin-top:14px;font-size:17px;font-weight:600}
.quote .qs{display:block;font-size:12px;opacity:.85;font-weight:400;margin-top:2px}
.prog{margin-top:8px;font-size:12px;opacity:.9}
.card{background:var(--card);border-radius:16px;padding:16px 18px;margin-top:16px;box-shadow:0 2px 10px rgba(30,40,60,.06)}
.card h2{margin:0 0 12px;font-size:17px}
.box{border-radius:12px;padding:12px;margin-top:10px}
.box.self{background:#fdecec;border:1px solid #f6c9c9}
.box.mem{background:#fff4e6;border:1px solid #ffd9a8}
.boxh{font-weight:700;margin-bottom:8px}
.none{margin:4px 0;color:var(--grn);font-weight:600}
.checklist{list-style:none;margin:0;padding:0}
.checklist li{display:flex;align-items:flex-start;padding:7px 0;border-top:1px dashed #e5e8ee}
.checklist li:first-child{border-top:none}
.checklist label{flex:1;display:flex;align-items:center;gap:8px;cursor:pointer}
.memo{font-size:24px;width:30px;text-align:center;flex:none}
.lv{font-size:12px;font-weight:700;background:#2b3444;color:#fff;border-radius:6px;padding:2px 6px;flex:none}
.mtxt{flex:1}
.od{color:var(--red)}
.pri{font-size:12px;font-weight:700;border-radius:6px;padding:2px 6px;flex:none;white-space:nowrap}
.pri.red{background:#fdecec;color:var(--red)}.pri.yellow{background:#fff7db;color:var(--yel)}.pri.green{background:#e7f7ec;color:var(--grn)}
label.done .mtxt{text-decoration:line-through;opacity:.5}
label.done .memo{filter:grayscale(1);opacity:.35}
.hint{font-size:12px;color:var(--sub);margin:8px 0 0}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #e5e8ee;padding:7px 9px;text-align:left}
th{background:#f0f3fa}
.plain{margin:0;padding-left:18px}.plain li{margin:5px 0}
.nlink{display:inline-block;margin-top:10px;font-size:13px;color:#3a6df0;text-decoration:none;font-weight:600}
.sanbo p{margin:0;background:#f0f4ff;border-radius:10px;padding:12px}
.src{font-size:13px}
</style></head>

const SKEY="brief-2026-07-25";
function b2a(b64){return Uint8Array.from(atob(b64),c=>c.charCodeAt(0));}
async function decrypt(pass){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(ENC.iv)},key,b2a(ENC.ct));
  return new TextDecoder().decode(pt);
}
function loadState(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}')}catch(e){return {}}}
function saveState(s){localStorage.setItem(SKEY,JSON.stringify(s))}
function refresh(){
  let self=0,mem=0;
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    const id=cb.dataset.id||'';
    if(id.startsWith('self-')){if(!cb.checked)self++;}
    else if(id.startsWith('mem-')){if(!cb.checked)mem++;}
    cb.closest('label').classList.toggle('done',cb.checked);
  });
  let hp=100-self*10-mem*5; hp=Math.max(0,Math.min(100,hp));
  const v=document.getElementById('hpval'); if(v)v.textContent=hp;
  const f=document.getElementById('hpfill'); if(f){f.style.width=hp+'%';f.className='hpfill '+(hp>=80?'ok':hp>=50?'warn':'bad');}
  const boxes=[...document.querySelectorAll('input[type=checkbox]')];
  const left=boxes.filter(c=>!c.checked).length;
  const p=document.getElementById('prog'); if(p)p.textContent=left?('残り '+left+' 件'):'全部やりきった！🎉';
}
function wire(){
  const st=loadState();
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    const id=cb.dataset.id; if(st[id])cb.checked=true;
    cb.addEventListener('change',()=>{const s=loadState();s[cb.dataset.id]=cb.checked;saveState(s);refresh();});
  });
  refresh();
}
async function unlock(){
  const pw=document.getElementById('pw').value;
  try{const html=await decrypt(pw);
    document.getElementById('content').innerHTML=html;
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){document.getElementById('err').textContent='パスフレーズが違います';}
}
document.getElementById('openbtn').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
