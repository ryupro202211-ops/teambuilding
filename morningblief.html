<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔒 朝ブリーフ</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:0 0 40px;background:#f4f6fa;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;color:#1f2430;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:0 14px}
header{background:linear-gradient(135deg,#3b5bdb 0%,#7048e8 55%,#c2255c 100%);color:#fff;padding:26px 0 30px;margin-bottom:18px}
header h1{margin:0 0 4px;font-size:22px;letter-spacing:.04em}
.date{font-size:13px;opacity:.9;margin-bottom:16px}
.hpbox{background:rgba(255,255,255,.16);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.hprow{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700}
.hpbar{flex:1;height:14px;background:rgba(0,0,0,.25);border-radius:8px;overflow:hidden}
.hpfill{height:100%;border-radius:8px;transition:width .35s ease,background .35s}
.hpfill.ok{background:#51cf66}.hpfill.warn{background:#fcc419}.hpfill.bad{background:#ff6b6b}
.hpnote{font-size:11px;opacity:.85;margin-top:6px}
.quote{background:rgba(255,255,255,.14);border-left:4px solid #fff;border-radius:0 8px 8px 0;padding:10px 14px;font-size:14px}
.quote .src{display:block;font-size:11px;opacity:.85;margin-top:5px}
.card{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(20,30,60,.07)}
.card h2{margin:0 0 12px;font-size:16px;display:flex;align-items:center;gap:7px}
.card.boss{background:#2b0d14;color:#ffd8de;border:2px solid #c92a2a}
.card.boss h2{color:#ff8787}
.card.self{border-left:5px solid #e03131}
.card.mem{border-left:5px solid #f76707}
ul.tl{list-style:none;margin:0;padding:0}
ul.tl li{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px dashed #e3e7ef}
ul.tl li:last-child{border-bottom:none}
label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
label input{margin-top:5px;width:17px;height:17px;flex:none;accent-color:#3b5bdb}
.memo{font-size:24px;width:30px;text-align:center;flex:none;line-height:1.2}
.bossemo{font-size:30px;margin-right:6px}
.mtxt{flex:1;font-size:13.5px}
.lv{display:inline-block;background:#c92a2a;color:#fff;font-size:12px;font-weight:700;padding:1px 7px;border-radius:9px;margin-left:6px;vertical-align:1px}
.over{color:#c92a2a;font-weight:700}
label.done .mtxt{text-decoration:line-through;opacity:.45}
label.done .memo{filter:grayscale(1);opacity:.35}
.nlink{font-size:11px;color:#3b5bdb;text-decoration:none;white-space:nowrap;border:1px solid #ccd5f0;border-radius:6px;padding:3px 7px;align-self:center}
.pri{font-size:11px;font-weight:700;padding:2px 8px;border-radius:9px;color:#fff;flex:none;margin-top:2px}
.p1{background:#e03131}.p2{background:#f59f00}.p3{background:#2f9e44}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px 8px;border-bottom:1px solid #e9ecf3;text-align:left}
th{background:#f1f3f9;font-size:12px}
.small{font-size:12px;color:#5c6579}
.sub{font-size:12px;color:#6a7385;margin:-6px 0 10px}
#prog{font-size:12px;color:#3b5bdb;font-weight:700;margin-top:8px}
a{color:#3b5bdb}
.cal{font-size:13px;margin:0;padding-left:18px}
#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#3b5bdb,#7048e8);display:flex;align-items:center;justify-content:center;z-index:99}
#lockgate .box{background:#fff;padding:28px 26px;border-radius:14px;text-align:center;width:280px}
#lockgate input{width:100%;padding:9px;font-size:15px;border:1px solid #ccd;border-radius:8px;margin:12px 0}
#lockgate button{width:100%;padding:10px;background:#3b5bdb;color:#fff;border:0;border-radius:8px;font-size:15px;cursor:pointer}
#err{color:#c92a2a;font-size:12px;min-height:16px;margin-top:8px}

</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate"><div class="box">
<div style="font-size:30px">🔒</div>
<div style="font-size:14px;font-weight:700">朝ブリーフ</div>
<input id="pw" type="password" placeholder="パスフレーズ" autocomplete="off">
<button id="go">開く</button>
<div id="err"></div>
</div></div>

function refresh(){
  const boxes=[...document.querySelectorAll('#content input[type=checkbox]')];
  let self=0,mem=0,td=0,tdDone=0;
  boxes.forEach(b=>{
    const id=b.dataset.id||'';
    const lab=b.closest('label'); if(lab) lab.classList.toggle('done',b.checked);
    if(id.startsWith('self-')&&!b.checked) self++;
    if(id.startsWith('mem-')&&!b.checked) mem++;
    if(id.startsWith('td-')){td++; if(b.checked) tdDone++;}
  });
  let hp=100-self*10-mem*5; hp=Math.max(0,Math.min(100,hp));
  const f=document.getElementById('hpfill'),v=document.getElementById('hpval');
  if(f){f.style.width=hp+'%';f.className='hpfill '+(hp>=80?'ok':(hp>=50?'warn':'bad'));}
  if(v)v.textContent=hp;
  const note=document.querySelector('.hpnote');
  if(note)note.textContent='自分の期限切れ '+self+'件 ×-10 ／ メンバー切れ '+mem+'件 ×-5 ／ 毎朝100にリセット';
  const p=document.getElementById('prog');
  if(p)p.textContent=(td-tdDone)===0?'🎉 全部やりきった！':('残り '+(td-tdDone)+' 件');
}
function wire(){
  const st=loadState();
  document.querySelectorAll('#content input[type=checkbox]').forEach(b=>{
    const id=b.dataset.id; if(st[id])b.checked=true;
    b.addEventListener('change',()=>{const s=loadState();s[b.dataset.id]=b.checked;saveState(s);refresh();});
  });
  refresh();
}
async function unlock(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err'); err.textContent='復号中…';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},k,b64(ENC.ct));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
