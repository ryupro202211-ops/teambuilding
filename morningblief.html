<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔒 朝ブリーフ</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1f2733;--sub:#6b7688;--line:#e6eaf2;
--red:#e23b3b;--redbg:#fde8e8;--org:#f08a24;--orgbg:#fdefdf;--grn:#28a765;--ylw:#e9b21a;
--boss:#3a1414;--bossink:#ffd6d6;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;line-height:1.6;}
.wrap{max-width:760px;margin:0 auto;padding:16px;}
.header{background:linear-gradient(135deg,#5b6ff0,#8b5cf6);color:#fff;border-radius:18px;
padding:22px 22px 26px;box-shadow:0 8px 24px rgba(90,80,200,.25);}
.header .date{font-size:14px;opacity:.9;}
.header h1{margin:2px 0 14px;font-size:22px;font-weight:800;}
.hpwrap{background:rgba(255,255,255,.22);border-radius:12px;padding:12px 14px;}
.hprow{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px;}
.hpbar{height:16px;border-radius:9px;background:rgba(0,0,0,.18);overflow:hidden;}
.hpfill{height:100%;border-radius:9px;transition:width .5s ease;}
.hpfill.ok{background:#34d17a;}.hpfill.warn{background:#ffd23f;}.hpfill.bad{background:#ff5b5b;}
.hpnote{font-size:11px;opacity:.9;margin-top:6px;}
.quote{margin-top:14px;background:rgba(255,255,255,.16);border-left:4px solid #fff;
border-radius:8px;padding:10px 14px;font-size:14px;}
.quote .src{display:block;margin-top:4px;font-size:12px;opacity:.85;text-align:right;}
.card{background:var(--card);border-radius:16px;padding:18px 18px;margin-top:16px;
box-shadow:0 2px 10px rgba(30,40,70,.06);}
.card h2{margin:0 0 12px;font-size:17px;}
.card.boss{background:var(--boss);color:var(--bossink);border:1px solid #722;}
.card.boss h2{color:#ff9a9a;}
.bossemo{font-size:30px;}
.alert-red{border:1px solid #f3b0b0;background:var(--redbg);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.alert-org{border:1px solid #f2cf9e;background:var(--orgbg);border-radius:12px;padding:12px 14px;}
.alert-red h3,.alert-org h3{margin:0 0 8px;font-size:14px;}
ul.items{list-style:none;margin:0;padding:0;}
ul.items li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line);}
ul.items li:last-child{border-bottom:none;}
label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
label.done .mtxt{text-decoration:line-through;color:var(--sub);}
label.done .memo{filter:grayscale(1);opacity:.35;}
.memo{font-size:24px;width:30px;text-align:center;flex:none;line-height:1.2;}
.lv{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:#c0392b;
border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.mtxt{flex:1;font-size:14px;}
.due{color:var(--red);font-weight:700;}
.nlink{flex:none;font-size:12px;color:#5b6ff0;text-decoration:none;white-space:nowrap;align-self:center;}
.nlink:hover{text-decoration:underline;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
th{color:var(--sub);font-weight:600;background:#f7f9fd;}
.pri{font-weight:700;border-radius:6px;padding:1px 7px;font-size:12px;color:#fff;white-space:nowrap;}
.pri.r{background:var(--red);}.pri.y{background:var(--ylw);}.pri.g{background:var(--grn);}
.small{font-size:12px;color:var(--sub);}
.snote{background:#eef2ff;border-radius:10px;padding:12px 14px;font-size:14px;}
a.src{color:#5b6ff0;}
#lockgate{position:fixed;inset:0;background:#0e1220;display:flex;align-items:center;justify-content:center;z-index:99;}
#lockgate .box{background:#fff;border-radius:16px;padding:26px 24px;width:300px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.4);}
#lockgate h2{margin:0 0 14px;font-size:18px;}
#lockgate input{width:100%;padding:10px;border:1px solid #cdd3e0;border-radius:8px;font-size:15px;}
#lockgate button{margin-top:12px;width:100%;padding:10px;border:none;border-radius:8px;background:#5b6ff0;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
#lockerr{color:#e23b3b;font-size:13px;margin-top:8px;min-height:18px;}
</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate">
  <div class="box">
    <h2>🔒 朝ブリーフ</h2>
    <input id="pw" type="password" placeholder="パスフレーズ" autofocus>
    <button id="openbtn">開く</button>
    <div id="lockerr"></div>
  </div>
</div>

  if(hp<0)hp=0; if(hp>100)hp=100;
  var fill=document.getElementById('hpfill'), val=document.getElementById('hpval');
  if(fill){fill.style.width=hp+'%'; fill.className='hpfill '+(hp>=80?'ok':(hp>=50?'warn':'bad'));}
  if(val)val.textContent=hp+' / 100';
}
function wire(){
  var st=loadState();
  document.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    var id=cb.getAttribute('data-id');
    if(st[id]) cb.checked=true;
    var lbl=cb.closest('label'); if(lbl&&cb.checked)lbl.classList.add('done');
    cb.addEventListener('change',function(){
      var s=loadState(); s[id]=cb.checked; saveState(s);
      var l=cb.closest('label'); if(l)l.classList.toggle('done',cb.checked);
      refresh();
    });
  });
  refresh();
}
async function decrypt(pass){
  var enc=new TextEncoder();
  var salt=Uint8Array.from(atob(ENC.salt),c=>c.charCodeAt(0));
  var iv=Uint8Array.from(atob(ENC.iv),c=>c.charCodeAt(0));
  var ct=Uint8Array.from(atob(ENC.ct),c=>c.charCodeAt(0));
  var baseKey=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:ENC.it,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
  return new TextDecoder().decode(plain);
}
async function tryOpen(){
  var pw=document.getElementById('pw').value;
  var err=document.getElementById('lockerr'); err.textContent='';
  try{
    var html=await decrypt(pw);
    document.getElementById('content').innerHTML=html;
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){ err.textContent='パスフレーズが違います'; }
}
document.getElementById('openbtn').addEventListener('click',tryOpen);
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryOpen();});
</script>
