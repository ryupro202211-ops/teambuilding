<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔒 朝ブリーフ</title>
<style>
  :root{--bg:#f4f6fb;--card:#ffffff;--ink:#1f2430;--sub:#5c6478;--red:#d92d20;--redbg:#fff1f0;--orange:#e8760c;--orangebg:#fff7ed;--green:#12855b;--greenbg:#ecfdf3;--yellow:#b8860b;--blue:#2f5fd0;--line:#e6e9f2;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;line-height:1.7;}
  .wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px;}
  header.brief{background:linear-gradient(135deg,#4a6cf7 0%,#7b3ff2 100%);color:#fff;border-radius:20px;padding:26px 28px;box-shadow:0 8px 24px rgba(80,60,200,.25);}
  header.brief .date{font-size:14px;opacity:.9;letter-spacing:.05em;}
  header.brief h1{margin:6px 0 14px;font-size:24px;}
  header.brief .quote{background:rgba(255,255,255,.16);border-radius:12px;padding:12px 16px;font-size:14px;}
  header.brief .quote .src{display:block;margin-top:4px;opacity:.85;font-size:12px;text-align:right;}
  .card{background:var(--card);border-radius:16px;padding:20px 22px;margin-top:18px;box-shadow:0 2px 10px rgba(30,40,80,.06);border:1px solid var(--line);}
  .card h2{margin:0 0 14px;font-size:18px;display:flex;align-items:center;gap:8px;}
  .alert-red{background:var(--redbg);border:1px solid #ffd6d1;border-radius:12px;padding:12px 16px;margin:10px 0;}
  .alert-red .ttl{color:var(--red);font-weight:700;}
  .alert-orange{background:var(--orangebg);border:1px solid #ffe0bd;border-radius:12px;padding:12px 16px;margin:10px 0;}
  .alert-orange .ttl{color:var(--orange);font-weight:700;}
  .over{color:var(--red);font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  th{background:#f7f8fc;color:var(--sub);font-weight:600;font-size:13px;}
  .badge{display:inline-block;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:700;white-space:nowrap;}
  .b-red{background:var(--redbg);color:var(--red);}
  .b-yellow{background:#fff8e1;color:var(--yellow);}
  .b-green{background:var(--greenbg);color:var(--green);}
  .b-blue{background:#eef3ff;color:var(--blue);}
  ul.clean{margin:6px 0 0;padding-left:20px;}
  ul.clean li{margin:5px 0;}
  .muted{color:var(--sub);font-size:13px;}
  .cal li{margin:6px 0;}
  a{color:var(--blue);}
  .comment{background:#f0f4ff;border-left:4px solid #4a6cf7;border-radius:8px;padding:12px 16px;font-size:14px;}

#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#4a6cf7,#7b3ff2);display:flex;align-items:center;justify-content:center;z-index:9999;}
#lockgate .box{background:#fff;border-radius:16px;padding:28px 26px;width:320px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.3);text-align:center;}
#lockgate h3{margin:0 0 6px;font-size:18px;color:#1f2430;}
#lockgate p{margin:0 0 16px;font-size:13px;color:#5c6478;}
#lockgate input{width:100%;padding:11px 12px;border:1px solid #d9dcea;border-radius:10px;font-size:15px;margin-bottom:12px;}
#lockgate button{width:100%;padding:11px;border:0;border-radius:10px;background:#4a6cf7;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
#lockerr{color:#d92d20;font-size:13px;margin-top:10px;min-height:16px;}
</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate">
  <div class="box">
    <h3>🔒 朝ブリーフ</h3>
    <p>パスフレーズを入力してください</p>
    <input id="pw" type="password" placeholder="パスフレーズ" autofocus>
    <button id="go">開く</button>
    <div id="lockerr"></div>
  </div>
</div>

function b2a(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0));}
async function unlock(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('lockerr');err.textContent='';
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(ENC.iv)},key,b2a(ENC.ct));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
  }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
