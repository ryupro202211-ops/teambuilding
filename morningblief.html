<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔒 朝ブリーフ</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:0 0 40px;background:#f2f4f8;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;color:#22272e;line-height:1.7}
.wrap{max-width:820px;margin:0 auto;padding:0 14px}
header.hd{background:linear-gradient(135deg,#4f6cf7 0%,#7b4ff7 55%,#c14ff7 100%);color:#fff;padding:26px 18px 22px;box-shadow:0 4px 18px rgba(80,60,200,.25)}
header.hd .inner{max-width:820px;margin:0 auto}
.date{font-size:13px;opacity:.9;letter-spacing:.08em}
h1{margin:4px 0 14px;font-size:24px;font-weight:800;letter-spacing:.02em}
.hpwrap{background:rgba(255,255,255,.18);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.hprow{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700}
.hpbar{flex:1;height:14px;background:rgba(0,0,0,.22);border-radius:8px;overflow:hidden}
.hpfill{height:100%;width:0;border-radius:8px;transition:width .4s ease,background .4s ease}
.hpfill.ok{background:linear-gradient(90deg,#38d17a,#7ce8a6)}
.hpfill.warn{background:linear-gradient(90deg,#f2c53d,#ffe08a)}
.hpfill.bad{background:linear-gradient(90deg,#f2553d,#ff9a8a)}
.hpnote{font-size:11px;opacity:.85;margin-top:6px}
.quote{background:rgba(255,255,255,.14);border-left:4px solid rgba(255,255,255,.7);border-radius:0 10px 10px 0;padding:10px 14px;font-size:14px}
.quote b{display:block;font-size:15px;margin-bottom:3px}
.quote span{font-size:12px;opacity:.85}
.card{background:#fff;border-radius:14px;padding:16px 18px;margin:16px 0;box-shadow:0 2px 10px rgba(30,40,80,.07)}
.card h2{margin:0 0 12px;font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.card.boss{background:#2a1116;color:#ffd9d9;border:1px solid #6d1f2a}
.card.boss h2{color:#ff8a8a}
.card.danger{border-left:6px solid #e8453c}
.card.danger h2{color:#c0392b}
.card.member{border-left:6px solid #f08a24}
.card.member h2{color:#c96a10}
.card.todo{border-left:6px solid #3d7bf2}
.card.today{border-left:6px solid #e8a33c}
.card.future{border-left:6px solid #7a5af2}
.card.sensei{border-left:6px solid #22b07d}
ul.lst{list-style:none;margin:0;padding:0}
ul.lst li{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px dashed #e3e7ef}
ul.lst li:last-child{border-bottom:none}
ul.lst label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
ul.lst input[type=checkbox]{margin-top:5px;width:17px;height:17px;flex:none;accent-color:#3d7bf2}
.memo{font-size:24px;width:30px;text-align:center;flex:none;line-height:1.2}
.mtxt{flex:1;font-size:14px}
label.done .mtxt{text-decoration:line-through;opacity:.45}
label.done .memo{filter:grayscale(1);opacity:.35}
.lv{display:inline-block;background:#e8453c;color:#fff;font-size:12px;font-weight:800;border-radius:6px;padding:1px 7px;margin-left:6px;vertical-align:1px}
.card.member .lv{background:#f08a24}
.over{color:#c0392b;font-weight:800}
.sub{display:block;font-size:12px;color:#6b7480;margin-top:2px}
.nlink{flex:none;font-size:12px;color:#3d7bf2;text-decoration:none;border:1px solid #cfdcfa;border-radius:8px;padding:3px 8px;background:#f3f7ff;white-space:nowrap;align-self:center}
.pri{display:inline-block;font-size:11px;font-weight:800;border-radius:6px;padding:1px 8px;margin-right:6px;color:#fff;vertical-align:1px}
.pri.p1{background:#e8453c}.pri.p2{background:#e0a52a}.pri.p3{background:#2ba36a}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{border-bottom:1px solid #e6eaf2;padding:8px 6px;text-align:left}
th{background:#f6f8fc;font-weight:700;font-size:12.5px;color:#54607a}
.prog{font-size:12.5px;color:#54607a;margin-top:10px;font-weight:700}
.srcs a{display:block;font-size:12.5px;color:#3d7bf2;word-break:break-all;padding:3px 0}
.mini{font-size:12.5px;color:#6b7480}
.cal{font-size:13.5px}
.cal b{color:#3d5bd0}
#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#2b3350,#4f3f7a);display:flex;align-items:center;justify-content:center;z-index:99}
#lockgate .box{background:#fff;border-radius:16px;padding:28px 26px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.35);width:min(340px,88vw)}
#lockgate h3{margin:0 0 14px;font-size:18px}
#lockgate input{width:100%;padding:11px 12px;font-size:16px;border:1px solid #cdd5e4;border-radius:10px;margin-bottom:12px}
#lockgate button{width:100%;padding:11px;font-size:15px;font-weight:800;color:#fff;background:#4f6cf7;border:0;border-radius:10px;cursor:pointer}
#lockerr{color:#e8453c;font-size:13px;margin-top:10px;min-height:18px}

</style>
</head>

<div id="content"></div>
<div id="lockgate"><div class="box">
<h3>🔒 朝ブリーフ</h3>
<input type="password" id="pw" placeholder="パスフレーズ" autocomplete="off">
<button id="unlockbtn">開く</button>
<div id="lockerr"></div>
</div></div>

const SKEY='brief-2026-07-23';
function loadState(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}')}catch(e){return {}}}
function saveState(s){try{localStorage.setItem(SKEY,JSON.stringify(s))}catch(e){}}
function refresh(){
  var boxes=document.querySelectorAll('#content input[type=checkbox][data-id]');
  var hp=100,left=0;
  boxes.forEach(function(b){
    var id=b.getAttribute('data-id');
    if(b.parentElement) b.parentElement.classList.toggle('done',b.checked);
    if(!b.checked){
      left++;
      if(id.indexOf('self-')===0) hp-=10;
      else if(id.indexOf('mem-')===0) hp-=5;
    }
  });
  hp=Math.max(0,Math.min(100,hp));
  var f=document.getElementById('hpfill'),v=document.getElementById('hpval'),n=document.getElementById('hpnote');
  if(f){f.style.width=hp+'%';f.className='hpfill '+(hp>=80?'ok':(hp>=50?'warn':'bad'));}
  if(v)v.textContent=hp;
  if(n)n.textContent='自分の期限切れ 1件 ×-10 ／ メンバー切れ 2件 ×-5 ／ 毎朝100にリセット';
  var p=document.getElementById('prog');
  if(p)p.textContent = left===0 ? '🎉 全部やりきった！' : ('残り '+left+' 件');
}
function wire(){
  var st=loadState();
  var boxes=document.querySelectorAll('#content input[type=checkbox][data-id]');
  boxes.forEach(function(b){
    var id=b.getAttribute('data-id');
    b.checked=!!st[id];
    b.addEventListener('change',function(){var s=loadState();s[id]=b.checked;saveState(s);refresh();});
  });
  refresh();
}
function b64(s){var r=atob(s),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
async function unlock(){
  var pw=document.getElementById('pw').value;
  var err=document.getElementById('lockerr');
  err.textContent='開いています…';
  try{
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},k,b64(ENC.ct));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){ err.textContent='パスフレーズが違います'; }
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('unlockbtn').addEventListener('click',unlock);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
  document.getElementById('pw').focus();
});
