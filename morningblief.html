<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔒 朝ブリーフ</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--ink:#1f2430;--sub:#5b6473;--line:#e6e8ef;
--red:#e23b3b;--redbg:#fdecec;--org:#e8820c;--orgbg:#fdf1e0;--grn:#1f9d55;--grnbg:#e7f6ee;--yel:#e0a800;--blu:#3168d8;--blubg:#eaf1fd;--pur:#6b4fd8;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;line-height:1.7;}
.wrap{max-width:820px;margin:0 auto;padding:18px 14px 60px;}
.header{background:linear-gradient(135deg,#5b7cf0 0%,#8a5bf0 55%,#c05bf0 100%);color:#fff;border-radius:20px;padding:26px 24px;box-shadow:0 8px 26px rgba(90,90,180,.28);}
.header .date{font-size:14px;opacity:.92;letter-spacing:.05em;}
.header h1{margin:6px 0 14px;font-size:24px;font-weight:800;}
.quote{background:rgba(255,255,255,.16);border-left:4px solid rgba(255,255,255,.8);padding:12px 14px;border-radius:10px;font-size:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-top:16px;box-shadow:0 2px 10px rgba(30,40,80,.05);}
.card h2{margin:0 0 12px;font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;}
.card h3{font-size:14px;margin:14px 0 6px;color:var(--sub);}
.alert-red{background:var(--redbg);border:1px solid #f4b5b5;border-radius:12px;padding:12px 14px;margin:8px 0;}
.alert-org{background:var(--orgbg);border:1px solid #f2cf97;border-radius:12px;padding:12px 14px;margin:8px 0;}
.alert-red .t{color:var(--red);font-weight:800;}
.alert-org .t{color:var(--org);font-weight:800;}
.over{color:var(--red);font-weight:800;}
ul{margin:6px 0;padding-left:20px;}
li{margin:5px 0;}
table{width:100%;border-collapse:collapse;margin-top:6px;font-size:14px;}
th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;}
th{background:#f0f2f8;font-weight:700;font-size:13px;}
.badge{display:inline-block;font-size:12px;font-weight:800;border-radius:999px;padding:2px 10px;color:#fff;}
.b-red{background:var(--red);}.b-yel{background:var(--yel);}.b-grn{background:var(--grn);}
.b-blu{background:var(--blu);}.b-org{background:var(--org);}.b-pur{background:var(--pur);}
.src a{color:var(--blu);text-decoration:none;word-break:break-all;}
.src a:hover{text-decoration:underline;}
.muted{color:var(--sub);font-size:13px;}
.time{display:inline-block;min-width:110px;font-weight:700;color:var(--pur);}

#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#5b7cf0,#8a5bf0,#c05bf0);display:flex;align-items:center;justify-content:center;z-index:9999;}
#lockbox{background:#fff;border-radius:18px;padding:30px 26px;width:min(90%,360px);box-shadow:0 12px 40px rgba(0,0,0,.3);text-align:center;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;}
#lockbox h3{margin:0 0 6px;font-size:19px;}
#lockbox p{margin:0 0 16px;color:#5b6473;font-size:13px;}
#pw{width:100%;padding:11px 12px;font-size:15px;border:1px solid #d5d9e4;border-radius:10px;margin-bottom:12px;}
#openbtn{width:100%;padding:11px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#5b7cf0,#8a5bf0);border:none;border-radius:10px;cursor:pointer;}
#err{color:#e23b3b;font-size:13px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate">
  <div id="lockbox">
    <h3>🔒 朝ブリーフ</h3>
    <p>パスフレーズを入力してください</p>
    <input id="pw" type="password" placeholder="パスフレーズ" autofocus>
    <button id="openbtn">開く</button>
    <div id="err"></div>
  </div>
</div>

function b64(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function unlock(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
    const html=new TextDecoder().decode(pt);
    document.getElementById('content').innerHTML=html;
    document.getElementById('lockgate').style.display='none';
  }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('openbtn').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
