<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 朝ブリーフ</title>
<style>
:root{
  --bg:#f4f6fb; --card:#ffffff; --ink:#1f2937; --sub:#6b7280;
  --line:#e5e7eb; --red:#dc2626; --redbg:#fef2f2; --redln:#fecaca;
  --org:#ea580c; --orgbg:#fff7ed; --orgln:#fed7aa;
  --ylw:#ca8a04; --grn:#16a34a; --blu:#2563eb; --blubg:#eff6ff;
}
*{box-sizing:border-box;}
body{
  margin:0; padding:0 0 60px; background:var(--bg); color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  line-height:1.75; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:900px; margin:0 auto; padding:0 16px;}
header.hero{
  background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 45%,#db2777 100%);
  color:#fff; padding:38px 16px 44px; margin-bottom:26px;
  box-shadow:0 4px 24px rgba(79,70,229,.25);
}
.hero-in{max-width:900px;margin:0 auto;}
.hero .date{font-size:14px; letter-spacing:.14em; opacity:.9; margin:0 0 6px;}
.hero h1{margin:0 0 18px; font-size:30px; letter-spacing:.02em;}
.quote{
  background:rgba(255,255,255,.16); border-left:4px solid rgba(255,255,255,.75);
  border-radius:8px; padding:14px 18px; backdrop-filter:blur(4px);
}
.quote .q{font-size:17px; font-weight:700; margin:0 0 6px;}
.quote .src{font-size:13px; opacity:.9; margin:0 0 8px;}
.quote .note{font-size:13.5px; opacity:.95; margin:0;}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:22px 24px; margin:0 0 20px; box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.card h2{
  margin:0 0 16px; font-size:19px; padding-bottom:10px;
  border-bottom:2px solid var(--line);
}
.card.danger{border-color:var(--redln); background:var(--redbg);}
.card.danger h2{color:var(--red); border-bottom-color:var(--redln);}
.card.warn{border-color:var(--orgln); background:var(--orgbg);}
.card.warn h2{color:var(--org); border-bottom-color:var(--orgln);}
table{width:100%; border-collapse:collapse; font-size:14.5px; margin:0 0 4px;}
th,td{padding:9px 10px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top;}
th{background:rgba(0,0,0,.035); font-size:13px; color:var(--sub); font-weight:700; white-space:nowrap;}
tr:last-child td{border-bottom:none;}
.over{color:var(--red); font-weight:700; white-space:nowrap;}
.badge{display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px; font-weight:700; white-space:nowrap;}
.b-red{background:#fee2e2; color:#991b1b;}
.b-ylw{background:#fef3c7; color:#92400e;}
.b-grn{background:#dcfce7; color:#166534;}
.b-blu{background:#dbeafe; color:#1e40af;}
ul{margin:0; padding-left:1.3em;} li{margin:5px 0;}
.callout{
  background:var(--blubg); border-left:4px solid var(--blu);
  border-radius:0 8px 8px 0; padding:12px 16px; margin:14px 0 0; font-size:14px;
}
.callout.alert{background:var(--orgbg); border-left-color:var(--org);}
.none{color:var(--sub); font-size:14px; margin:0;}
.sched li{margin:7px 0; font-size:14.5px;}
.sched b{color:var(--blu);}
.cmt p{margin:0 0 12px; font-size:14.5px;} .cmt p:last-child{margin:0;}
.cmt strong{background:linear-gradient(transparent 62%, #fde68a 62%); padding:0 2px;}
a{color:var(--blu); text-decoration:none; word-break:break-all;}
a:hover{text-decoration:underline;}
.src-list{font-size:13.5px;} .src-list li{margin:4px 0;}
.foot{text-align:center; color:var(--sub); font-size:12px; margin-top:26px;}
@media(max-width:640px){
  .hero h1{font-size:23px;} .card{padding:17px 15px;} table{font-size:13px;}
  th,td{padding:7px 6px;}
}

#lockgate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 45%,#db2777 100%);}
#lockbox{background:#fff;border-radius:16px;padding:34px 30px;width:min(92vw,380px);
  box-shadow:0 18px 50px rgba(0,0,0,.32);text-align:center;}
#lockbox h1{margin:0 0 6px;font-size:21px;color:#1f2937;}
#lockbox p.sub{margin:0 0 20px;font-size:13.5px;color:#6b7280;}
#pw{width:100%;padding:12px 14px;font-size:16px;border:1px solid #d1d5db;border-radius:9px;
  outline:none;margin-bottom:12px;font-family:inherit;}
#pw:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.16);}
#go{width:100%;padding:12px;font-size:15px;font-weight:700;color:#fff;background:#7c3aed;
  border:0;border-radius:9px;cursor:pointer;font-family:inherit;}
#go:hover{background:#6d28d9;} #go:disabled{opacity:.6;cursor:default;}
#err{margin:12px 0 0;font-size:13.5px;color:#dc2626;font-weight:700;min-height:1.2em;}
</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate">
  <div id="lockbox">
    <h1>🔒 朝ブリーフ</h1>
    <p class="sub">パスフレーズを入力してください</p>
    <input id="pw" type="password" autocomplete="current-password" placeholder="パスフレーズ">
    <button id="go">開く</button>
    <p id="err"></p>
  </div>
</div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(){
  const btn = document.getElementById('go');
  const err = document.getElementById('err');
  const pass = document.getElementById('pw').value;
  err.textContent = ''; btn.disabled = true; btn.textContent = '復号中…';
  try{
    const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64(ENC.salt), iterations:ENC.it, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['decrypt']);

    err.textContent = 'パスフレーズが違います';
    btn.disabled = false; btn.textContent = '開く';
  }
}

document.getElementById('pw').addEventListener('keydown', e => { if(e.key === 'Enter') unlock(); });
