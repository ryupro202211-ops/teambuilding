<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔒 朝ブリーフ</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:0 0 40px;background:#f4f6fa;color:#1c2233;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.7}
.wrap{max-width:860px;margin:0 auto;padding:0 14px}
header{background:linear-gradient(135deg,#4a5fc1 0%,#7b4fc0 55%,#c0498a 100%);color:#fff;padding:26px 0 30px;margin-bottom:18px}
header .wrap{padding:0 18px}
.dt{font-size:13px;opacity:.9;letter-spacing:.08em}
h1{margin:4px 0 14px;font-size:26px;font-weight:800}
.hpbox{background:rgba(255,255,255,.16);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.hprow{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}
.hpbar{flex:1;height:16px;background:rgba(0,0,0,.25);border-radius:8px;overflow:hidden}
.hpfill{height:100%;border-radius:8px;transition:width .3s}
.hpfill.ok{background:#3ddc84}.hpfill.warn{background:#ffc93c}.hpfill.bad{background:#ff5d5d}
.hpnote{font-size:11px;opacity:.85;margin-top:6px}
.quote{background:rgba(255,255,255,.14);border-left:4px solid rgba(255,255,255,.7);border-radius:8px;padding:12px 14px;font-size:15px}
.quote .src{display:block;font-size:12px;opacity:.85;margin-top:6px;text-align:right}
.card{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(30,40,80,.07)}
.card h2{margin:0 0 12px;font-size:17px;font-weight:800;border-bottom:2px solid #eceff6;padding-bottom:8px}
.card.self{border-left:6px solid #e03131}
.card.self h2{color:#c92a2a}
.card.mem{border-left:6px solid #f08c00}
.card.mem h2{color:#e8590c}
.card.boss{background:#2b1416;color:#ffe3e3;border-left:6px solid #ff4d4d}
.card.boss h2{color:#ff8787;border-bottom-color:#4a2226}
.bossemo{font-size:30px;vertical-align:middle}
ul.tl{list-style:none;margin:0;padding:0}
ul.tl li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px dashed #eceff6}
ul.tl li:last-child{border-bottom:none}
label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
label input{margin-top:5px;width:17px;height:17px;flex:none;accent-color:#4a5fc1}
.memo{font-size:24px;width:30px;text-align:center;flex:none;line-height:1.2}
.mtxt{flex:1;font-size:14px}
.lv{display:inline-block;background:#e03131;color:#fff;font-size:12px;font-weight:800;border-radius:6px;padding:1px 7px;margin-right:6px;vertical-align:1px}
.card.mem .lv{background:#f08c00}
.over{color:#c92a2a;font-weight:800}
label.done .mtxt{text-decoration:line-through;opacity:.5}
label.done .memo{filter:grayscale(1);opacity:.35}
.nlink{flex:none;font-size:12px;color:#4a5fc1;text-decoration:none;border:1px solid #d6dcf0;border-radius:6px;padding:2px 8px;white-space:nowrap;align-self:center}
.nlink:hover{background:#eef1fb}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #eceff6}
th{background:#f7f8fc;font-size:13px;color:#5a6484}
.p1{color:#c92a2a;font-weight:800}.p2{color:#e8590c;font-weight:700}.p3{color:#2f9e44;font-weight:700}
.small{font-size:13px;color:#5a6484}
#prog{font-size:13px;font-weight:700;color:#4a5fc1;margin-top:10px}
a{color:#4a5fc1}
.card ul.plain{margin:0;padding-left:20px;font-size:14px}
.card ul.plain li{margin-bottom:5px}
#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#3b4aa0,#7b4fc0);display:flex;align-items:center;justify-content:center;z-index:99}
#lockgate .box{background:#fff;border-radius:14px;padding:28px 26px;width:300px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.3)}
#lockgate h3{margin:0 0 14px;font-size:17px}
#lockgate input{width:100%;padding:10px;font-size:15px;border:1px solid #ccd3e6;border-radius:8px;margin-bottom:10px}
#lockgate button{width:100%;padding:10px;font-size:15px;font-weight:700;background:#4a5fc1;color:#fff;border:none;border-radius:8px;cursor:pointer}
#lockerr{color:#c92a2a;font-size:13px;margin-top:8px;min-height:18px}
</style>
</head><body>
<div id="content"></div>

const SKEY="brief-2026-07-20";
function b64(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u}
function loadState(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}')}catch(e){return {}}}
function saveState(s){try{localStorage.setItem(SKEY,JSON.stringify(s))}catch(e){}}
function refresh(){
  const boxes=[...document.querySelectorAll('#content input[type=checkbox]')];
  let self=0,mem=0,todoLeft=0;
  boxes.forEach(b=>{const id=b.dataset.id||'';
    if(id.startsWith('self-')&&!b.checked)self++;
    if(id.startsWith('mem-')&&!b.checked)mem++;
    if(id.startsWith('td-')&&!b.checked)todoLeft++;
    const l=b.closest('label'); if(l)l.classList.toggle('done',b.checked);});
  let hp=100-self*10-mem*5; hp=Math.max(0,Math.min(100,hp));
  const f=document.getElementById('hpfill'), v=document.getElementById('hpval');
  if(f){f.style.width=hp+'%';f.className='hpfill '+(hp>=80?'ok':hp>=50?'warn':'bad')}
  if(v)v.textContent=hp+'/100';
  const n=document.querySelector('.hpnote');
  if(n)n.textContent='自分の期限切れ '+self+'件 ×-10 ／ メンバー切れ '+mem+'件 ×-5 ／ 毎朝100にリセット';
  const p=document.getElementById('prog');
  if(p)p.textContent=todoLeft===0?'全部やりきった！':('今日のToDo 残り '+todoLeft+' 件');
}
function wire(){
  const st=loadState();
  document.querySelectorAll('#content input[type=checkbox]').forEach(b=>{
    if(st[b.dataset.id])b.checked=true;
    b.addEventListener('change',()=>{const s=loadState();s[b.dataset.id]=b.checked;saveState(s);refresh();});
  });
  refresh();
}
async function unlock(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('lockerr'); err.textContent='復号中…';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},k,b64(ENC.ct));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
