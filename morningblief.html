<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 朝ブリーフ</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1f2733;--sub:#6b7688;--line:#e6eaf0;--red:#e5484d;--redbg:#fdecec;--org:#f5a524;--orgbg:#fff6e6;--grn:#30a46c;--grnbg:#e9f7ef;--ylw:#f5c518;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;padding:14px;max-width:760px;margin:0 auto;-webkit-text-size-adjust:100%}
.header{background:linear-gradient(135deg,#5b7cfa,#8a5cf6);color:#fff;border-radius:18px;padding:22px 20px;box-shadow:0 8px 24px rgba(91,124,250,.28)}
.header .date{font-size:13px;opacity:.9}
.header h1{font-size:20px;margin:2px 0 14px}
.hpwrap{background:rgba(255,255,255,.2);border-radius:12px;padding:12px}
.hprow{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px}
.hpbar{height:16px;background:rgba(0,0,0,.18);border-radius:8px;overflow:hidden}
.hpfill{height:100%;border-radius:8px;transition:width .5s,background .5s}
.hpfill.ok{background:#3ddc84}.hpfill.warn{background:#ffd23f}.hpfill.bad{background:#ff5a5f}
.hpcalc{font-size:11px;opacity:.85;margin-top:6px}
.quote{margin-top:14px;background:rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;font-size:14px}
.quote .src{display:block;font-size:12px;opacity:.85;margin-top:4px;text-align:right}
.card{background:var(--card);border-radius:16px;padding:16px 18px;margin-top:14px;box-shadow:0 2px 10px rgba(30,40,60,.05)}
.card h2{font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card.boss{background:#2a1518;color:#ffd7d7;border:1px solid #5c2327}
.card.red{border-left:5px solid var(--red)}
.card.org{border-left:5px solid var(--org)}
.muted{color:var(--sub);font-size:13px}
ul.tasks{list-style:none}
ul.tasks li{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
ul.tasks li:last-child{border-bottom:none}
ul.tasks label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
ul.tasks label.done .mtxt{text-decoration:line-through;color:var(--sub)}
ul.tasks label.done .memo{filter:grayscale(1);opacity:.35}
.memo{font-size:24px;width:30px;text-align:center;flex:none;line-height:1.3}
.lv{display:inline-block;background:#ececf3;color:#444;font-size:12px;font-weight:700;border-radius:6px;padding:1px 6px;margin-left:4px}
.lv.hot{background:var(--redbg);color:var(--red)}
.mtxt{flex:1}
.mtxt .sub{display:block;font-size:12px;color:var(--sub)}
.bossemo{font-size:30px}
.over{color:var(--red);font-weight:700}
.nlink{font-size:12px;color:#5b7cfa;text-decoration:none;white-space:nowrap;margin-left:6px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--sub);font-weight:600;font-size:12px}
.pill{display:inline-block;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700}
.p-red{background:var(--redbg);color:var(--red)}.p-ylw{background:#fef7d6;color:#a97a00}.p-grn{background:var(--grnbg);color:var(--grn)}
.badge{display:inline-block;background:var(--orgbg);color:#a86a00;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700}
.src-list{font-size:13px}.src-list a{color:#5b7cfa}
.prog{font-size:13px;color:var(--sub);margin-top:8px}
.foot{text-align:center;color:var(--sub);font-size:11px;margin:18px 0 6px}
</style>
<style>
#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#5b7cfa,#8a5cf6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;color:#fff;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif}
#lockgate h2{font-size:20px;margin-bottom:16px}
#lockgate input{font-size:16px;padding:10px 14px;border-radius:10px;border:none;width:220px;text-align:center}
#lockgate button{margin-top:12px;font-size:16px;padding:10px 26px;border-radius:10px;border:none;background:#1f2733;color:#fff;cursor:pointer}
#lockerr{margin-top:10px;font-size:13px;color:#ffe0e0;min-height:18px}
</style>
</head>
<body>
<div id="lockgate">
  <h2>🔒 朝ブリーフ</h2>
  <input id="pw" type="password" placeholder="パスフレーズ" autocomplete="off">
  <button id="openbtn">開く</button>
  <div id="lockerr"></div>
</div>
<div id="content"></div>

const SKEY='brief-2026-07-21';
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function decrypt(pass){
 const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ENC.iv)},key,b64d(ENC.ct));
 return new TextDecoder().decode(pt);
}
function loadState(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}');}catch(e){return {};}}
function saveState(s){try{localStorage.setItem(SKEY,JSON.stringify(s));}catch(e){}}
function refresh(){
 let selfU=0,memU=0,totalU=0;
 document.querySelectorAll('#content input[type=checkbox]').forEach(cb=>{
  const id=cb.getAttribute('data-id')||'';
  if(!cb.checked){totalU++; if(id.startsWith('self-'))selfU++; else if(id.startsWith('mem-'))memU++;}
 });
 let hp=100-selfU*10-memU*5; hp=Math.max(0,Math.min(100,hp));
 const f=document.getElementById('hpfill'),v=document.getElementById('hpval'),c=document.getElementById('hpcalc');
 if(f){f.style.width=hp+'%';f.className='hpfill '+(hp>=80?'ok':hp>=50?'warn':'bad');}
 if(v)v.textContent=hp+' / 100';
 if(c)c.textContent='自分の期限切れ '+selfU+'件 x-10 / メンバー切れ '+memU+'件 x-5 / 毎朝100にリセット';
 const p=document.getElementById('prog');
 if(p)p.textContent= totalU===0 ? '全部やりきった！' : ('残り '+totalU+' 件');
}
function wire(){
 const st=loadState();
 document.querySelectorAll('#content input[type=checkbox]').forEach(cb=>{
  const id=cb.getAttribute('data-id');
  if(st[id]){cb.checked=true;const l=cb.closest('label');if(l)l.classList.add('done');}
  cb.addEventListener('change',()=>{
   const l=cb.closest('label');if(l)l.classList.toggle('done',cb.checked);
   const s=loadState();s[id]=cb.checked;saveState(s);refresh();
  });
 });
 refresh();
}
async function tryOpen(){
 const pw=document.getElementById('pw').value;
 const err=document.getElementById('lockerr');
 err.textContent='復号中...';
 try{
  const htmlTxt=await decrypt(pw);
  document.getElementById('content').innerHTML=htmlTxt;
  document.getElementById('lockgate').style.display='none';
  wire();
 }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('openbtn').addEventListener('click',tryOpen);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryOpen();});
