<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>🔒 朝ブリーフ</title><style>
:root{--bg:#0f1226;--card:#171a33;--ink:#e9ecf5;--mut:#9aa2c0;--red:#ff5a6a;--org:#ffb03a;--grn:#37d67a;--ylw:#ffd24a;}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(160deg,#0f1226,#1a1f45);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.65}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.hdr{background:linear-gradient(135deg,#3b2a7a,#7a2a5e);border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.hdr .date{color:#e9d9ff;font-size:14px}
.hdr h1{margin:4px 0 14px;font-size:22px}
.hpbar{height:16px;background:rgba(255,255,255,.18);border-radius:10px;overflow:hidden}
.hpfill{height:100%;width:80%;background:var(--grn);transition:.4s}
.hpfill.warn{background:var(--ylw)}.hpfill.bad{background:var(--red)}
.hprow{margin-top:6px;font-weight:700}
.hpnote{color:#e0d6ff;font-size:12px;margin-top:2px}
.quote{margin-top:16px;padding:14px 16px;background:rgba(0,0,0,.22);border-left:4px solid #ffd24a;border-radius:10px;font-size:15px}
.qsrc{display:block;margin-top:8px;color:#ffe;opacity:.85;font-size:13px;text-align:right}
.card{background:var(--card);border-radius:16px;padding:16px 18px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.card h2{margin:0 0 12px;font-size:17px}
.card.danger{border:1px solid rgba(255,90,106,.5);background:linear-gradient(180deg,#2a1620,#171a33)}
.card.warn2{border:1px solid rgba(255,176,58,.5);background:linear-gradient(180deg,#2a2216,#171a33)}
.card.tip{border:1px dashed rgba(255,210,74,.5)}
.list{list-style:none;margin:0;padding:0}
.list li{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.list li:last-child{border-bottom:none}
.list label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.list input{margin-top:4px;transform:scale(1.25)}
.memo{font-size:24px;width:30px;text-align:center;flex:none}
.lv{font-size:12px;font-weight:700;background:#3a1420;color:#ff90a0;border-radius:8px;padding:2px 6px;align-self:center;flex:none}
.mtxt{flex:1}
label.done .mtxt{text-decoration:line-through;opacity:.5}
label.done .memo{filter:grayscale(1);opacity:.35}
.pri{font-size:12px;font-weight:700;border-radius:8px;padding:2px 8px;align-self:center;flex:none}
.p-r{background:#3a1620;color:#ff7a88}.p-y{background:#3a3216;color:#ffd24a}.p-g{background:#16321f;color:#5fe39a}
.nlink{font-size:12px;color:#9ec2ff;text-decoration:none;white-space:nowrap;align-self:center}
.nlink:hover{text-decoration:underline}
.plain{margin:0;padding-left:18px}.plain li{padding:3px 0}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid rgba(255,255,255,.1);padding:8px;text-align:left}
th{background:rgba(255,255,255,.05)}
.mini{color:var(--mut);font-size:13px;margin:6px 0 0}
a{color:#9ec2ff}
#lockgate{position:fixed;inset:0;background:linear-gradient(160deg,#0f1226,#1a1f45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:99;padding:20px;text-align:center}
#lockgate h2{margin:0;color:var(--ink)}
#lockgate input{padding:12px 14px;border-radius:10px;border:1px solid #444;background:#0d1024;color:#fff;font-size:16px;width:min(280px,80vw)}
#lockgate button{padding:12px 24px;border:none;border-radius:10px;background:#6a3aad;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
#lockerr{color:var(--red);min-height:20px;font-size:14px}
</style></head><body>

function b2u(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0));}
async function decrypt(pass){
  const salt=b2u(ENC.salt),iv=b2u(ENC.iv),data=b2u(ENC.ct);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
  return new TextDecoder().decode(pt);
}
function loadState(){try{return JSON.parse(localStorage.getItem(SKEY))||{}}catch(e){return {}}}
function saveState(s){localStorage.setItem(SKEY,JSON.stringify(s))}
function refresh(){
  let self=0,mem=0;
  document.querySelectorAll('#content input[type=checkbox]').forEach(c=>{
    const id=c.dataset.id||'';const done=c.checked;
    if(!done){if(id.startsWith('self-'))self++;else if(id.startsWith('mem-'))mem++;}
  });
  let hp=100-self*10-mem*5;if(hp<0)hp=0;if(hp>100)hp=100;
  const f=document.getElementById('hpfill');if(f){f.style.width=hp+'%';f.className='hpfill'+(hp>=80?'':hp>=50?' warn':' bad');}
  const v=document.getElementById('hpval');if(v)v.textContent='HP '+hp+' / 100';
}
function wire(){
  const st=loadState();
  document.querySelectorAll('#content input[type=checkbox]').forEach(c=>{
    const id=c.dataset.id;if(st[id])c.checked=true;
    const lab=c.closest('label');if(lab&&c.checked)lab.classList.add('done');
    c.addEventListener('change',()=>{
      const s=loadState();s[id]=c.checked;saveState(s);
      if(lab)lab.classList.toggle('done',c.checked);
      refresh();
    });
  });
  refresh();
}
async function tryOpen(){
  const p=document.getElementById('pass').value;
  const err=document.getElementById('lockerr');err.textContent='復号中…';
  try{
    const htmlStr=await decrypt(p);
    document.getElementById('content').innerHTML=htmlStr;
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('openbtn').addEventListener('click',tryOpen);
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')tryOpen();});
</script>
