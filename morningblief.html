<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 朝ブリーフ</title>
<style>
  :root{
    --red:#e53935; --redbg:#ffebee; --orange:#fb8c00; --orangebg:#fff3e0;
    --green:#43a047; --greenbg:#e8f5e9; --yellow:#fdd835; --blue:#1e88e5; --bluebg:#e3f2fd;
    --ink:#2b2b2b; --sub:#6b6b6b; --line:#eee; --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:0 0 60px; background:#f4f6f8; color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    line-height:1.7;
  }
  .wrap{max-width:860px; margin:0 auto; padding:16px;}
  header.hero{
    background:linear-gradient(135deg,#5b6df0 0%,#8e5bf0 50%,#f05b9c 100%);
    color:#fff; border-radius:20px; padding:28px 26px; margin:16px 0 22px;
    box-shadow:0 8px 24px rgba(94,80,220,.25);
  }
  .hero .date{font-size:15px; opacity:.95; letter-spacing:.05em;}
  .hero h1{margin:6px 0 14px; font-size:26px; font-weight:800;}
  .hero .quote{
    background:rgba(255,255,255,.16); border-left:4px solid rgba(255,255,255,.7);
    padding:12px 16px; border-radius:10px; font-size:15px;
  }
  .hero .quote .src{display:block; margin-top:6px; font-size:13px; opacity:.85;}
  .card{
    background:var(--card); border-radius:16px; padding:20px 22px; margin:0 0 18px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
  }
  .card h2{
    margin:0 0 14px; font-size:19px; font-weight:800; display:flex; align-items:center; gap:8px;
    padding-bottom:10px; border-bottom:2px solid var(--line);
  }
  .alertbox{border-radius:14px; padding:16px 18px; margin:0 0 18px;}
  .alertbox.self{background:var(--redbg); border:2px solid var(--red);}
  .alertbox.member{background:var(--orangebg); border:2px solid var(--orange);}
  .alertbox h2{border:none; padding:0; margin:0 0 12px;}
  .alertbox.self h2{color:var(--red);}
  .alertbox.member h2{color:#e65100;}
  ul.clean{list-style:none; margin:0; padding:0;}
  ul.clean li{
    padding:10px 12px; margin:0 0 8px; background:#fafafa; border-radius:10px;
    border-left:4px solid #ccc; font-size:15px;
  }
  ul.clean li.od{border-left-color:var(--red);}
  ul.clean li.tod{border-left-color:var(--orange); background:#fff8f1;}
  ul.clean li.fut{border-left-color:var(--blue);}
  .over{color:var(--red); font-weight:800;}
  .tag{display:inline-block; font-size:12px; font-weight:700; padding:2px 8px; border-radius:20px; margin-right:6px; color:#fff;}
  .tag.red{background:var(--red);} .tag.org{background:var(--orange);} .tag.blue{background:var(--blue);} .tag.grn{background:var(--green);}
  table{width:100%; border-collapse:collapse; font-size:14.5px;}
  th,td{padding:10px 10px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top;}
  th{background:#f7f8fa; font-weight:700; color:var(--sub); font-size:13px;}
  .pri{white-space:nowrap; font-weight:800;}
  .badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:12.5px; font-weight:800; color:#fff;}
  .b-red{background:var(--red);} .b-yellow{background:#f9a825;} .b-green{background:var(--green);}
  .meta{font-size:13px; color:var(--sub);}
  .cal li{border-left-color:#8e5bf0;}
  .cal .t{font-weight:700; color:#5b3fb0;}
  .comment{background:var(--bluebg); border-left:4px solid var(--blue);}
  .comment h2{color:#155fa0; border-bottom-color:#cfe3f7;}
  a{color:var(--blue); word-break:break-all;}
  .none{color:var(--sub); font-size:14px; padding:4px 0;}
  footer{text-align:center; color:var(--sub); font-size:12px; margin-top:20px;}
</style>
</head>

(function(){
  function b64d(s){var bin=atob(s);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
  async function decryptData(pass){
    var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(ENC.salt),iterations:ENC.it,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(ENC.iv)},key,b64d(ENC.ct));
    return new TextDecoder().decode(pt);
  }
  async function submitPass(){
    var el=document.getElementById("lockpass"); var err=document.getElementById("lockerr"); err.textContent="";
    try{ var html=await decryptData(el.value); document.getElementById("content").innerHTML=html; document.getElementById("lockgate").style.display="none"; }
    catch(e){ err.textContent="パスフレーズが違います"; }
  }
  document.getElementById("lockbtn").addEventListener("click",submitPass);
  document.getElementById("lockpass").addEventListener("keydown",function(e){ if(e.key==="Enter") submitPass(); });
  document.getElementById("lockpass").focus();
})();
</script>
