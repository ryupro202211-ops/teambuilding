<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>🔒 朝ブリーフ</title><style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1f2430;--sub:#6b7280;--line:#e5e7eb;
--red:#dc2626;--redbg:#fef2f2;--orange:#ea580c;--orangebg:#fff7ed;
--green:#16a34a;--yellow:#ca8a04;--blue:#2563eb;--purple:#7c3aed}
*{box-sizing:border-box}
body{margin:0;padding:0 0 60px;background:var(--bg);color:var(--ink);
font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
line-height:1.75;-webkit-text-size-adjust:100%}
.wrap{max-width:860px;margin:0 auto;padding:0 16px}
header{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 45%,#db2777 100%);
color:#fff;padding:28px 0 32px;margin-bottom:22px;box-shadow:0 4px 20px rgba(79,70,229,.25)}
header .date{font-size:13px;opacity:.9;letter-spacing:.08em}
header h1{margin:4px 0 18px;font-size:26px;font-weight:800;letter-spacing:.02em}
.hpwrap{background:rgba(255,255,255,.16);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.hprow{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;margin-bottom:7px}
.hpbar{height:14px;background:rgba(0,0,0,.22);border-radius:99px;overflow:hidden}
.hpfill{height:100%;border-radius:99px;transition:width .45s ease,background .45s ease}
.hpfill.ok{background:linear-gradient(90deg,#34d399,#10b981)}
.hpfill.warn{background:linear-gradient(90deg,#fcd34d,#f59e0b)}
.hpfill.bad{background:linear-gradient(90deg,#fb7185,#e11d48)}
.hpnote{font-size:11px;opacity:.82;margin-top:6px;line-height:1.5}
.quote{background:rgba(255,255,255,.14);border-left:4px solid rgba(255,255,255,.65);
border-radius:0 10px 10px 0;padding:12px 14px}
.quote .q{font-size:15px;font-weight:700;line-height:1.7}
.quote .src{font-size:12px;opacity:.85;margin-top:5px}
.card{background:var(--card);border-radius:14px;padding:18px 20px;margin-bottom:16px;
box-shadow:0 1px 3px rgba(0,0,0,.06),0 6px 18px rgba(0,0,0,.04)}
.card h2{margin:0 0 12px;font-size:17px;font-weight:800;letter-spacing:.01em}
.card.boss{background:linear-gradient(160deg,#3b0d14,#5b1220);color:#fde8e8;
border:1px solid #7f1d1d;box-shadow:0 8px 26px rgba(127,29,29,.35)}
.card.boss h2{color:#fecaca}
.bossbody{display:flex;align-items:center;gap:14px}
.bossemo{font-size:30px;line-height:1}
.bossname{font-size:15px;font-weight:700}
.bosssub{font-size:12px;opacity:.8;margin-top:3px}
.card.self{border-left:5px solid var(--red);background:var(--redbg)}
.card.self h2{color:var(--red)}
.card.mem{border-left:5px solid var(--orange);background:var(--orangebg)}
.card.mem h2{color:var(--orange)}
ul.mlist{list-style:none;margin:0;padding:0}
ul.mlist li{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line)}
ul.mlist li:last-child{border-bottom:0}
label{flex:1;display:flex;align-items:flex-start;gap:8px;cursor:pointer}
label input{margin-top:6px;width:17px;height:17px;flex:none;accent-color:var(--purple);cursor:pointer}
.memo{font-size:24px;width:30px;text-align:center;flex:none;line-height:1.3}
.mtxt{flex:1;font-size:14px}
.lv{display:inline-block;background:#111827;color:#fff;font-size:12px;font-weight:800;
border-radius:5px;padding:1px 6px;margin-right:6px;vertical-align:1px}
label.done .mtxt{text-decoration:line-through;opacity:.45}
label.done .memo{filter:grayscale(1);opacity:.35}
.nlink{flex:none;font-size:11px;color:var(--blue);text-decoration:none;
border:1px solid #bfdbfe;background:#eff6ff;border-radius:6px;padding:2px 7px;white-space:nowrap;margin-top:5px}
.nlink:hover{background:#dbeafe}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:#f9fafb;font-weight:700;font-size:12.5px;color:var(--sub)}
tr:last-child td{border-bottom:0}
.prog{font-size:12.5px;color:var(--sub);margin-bottom:10px;font-weight:700}
.cal h3{margin:14px 0 5px;font-size:13px;color:var(--purple);font-weight:800}
.cal h3:first-child{margin-top:0}
.cal ul{margin:0;padding-left:19px;font-size:13.5px}
.cal li{margin:2px 0}
.comment{font-size:14px;line-height:1.85}
.src a{color:var(--blue);font-size:13px;text-decoration:none;word-break:break-all}
.src a:hover{text-decoration:underline}
.src li{margin:5px 0}
.empty{color:var(--sub);font-size:13.5px}
#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#312e81,#7c3aed,#be185d);
display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.gate{background:#fff;border-radius:16px;padding:30px 26px;max-width:340px;width:100%;
box-shadow:0 18px 50px rgba(0,0,0,.32);text-align:center}
.gate h2{margin:0 0 6px;font-size:19px}
.gate p{margin:0 0 16px;font-size:12.5px;color:var(--sub)}
.gate input{width:100%;padding:11px 12px;font-size:16px;border:1.5px solid var(--line);
border-radius:9px;margin-bottom:10px;font-family:inherit}
.gate input:focus{outline:0;border-color:var(--purple)}
.gate button{width:100%;padding:11px;font-size:15px;font-weight:800;color:#fff;background:var(--purple);
border:0;border-radius:9px;cursor:pointer;font-family:inherit}
.gate button:hover{background:#6d28d9}
.gate button:disabled{opacity:.6;cursor:wait}
#err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:17px;font-weight:700}
@media(max-width:600px){header h1{font-size:21px}.card{padding:15px 14px}
th,td{padding:6px 5px;font-size:12.5px}.memo{font-size:21px;width:26px}}
</style></head><body><div id="content"></div><div id="lockgate"><div class="gate"><h2>🔒 朝ブリーフ</h2><p>パスフレーズを入力してください</p><input type="password" id="pw" autocomplete="off" placeholder="パスフレーズ"><button id="go">開く</button><div id="err"></div></div></div><script>

const SKEY='brief-2026-07-18';
function loadState(){try{return JSON.parse(localStorage.getItem(SKEY)||'{}')}catch(e){return{}}}
function saveState(s){try{localStorage.setItem(SKEY,JSON.stringify(s))}catch(e){}}
function refresh(){
  const s=loadState();
  const boxes=[].slice.call(document.querySelectorAll('#content input[type=checkbox][data-id]'));
  let self=0,mem=0,left=0;
  boxes.forEach(function(b){
    const id=b.dataset.id, done=!!s[id];
    b.checked=done;
    const lab=b.closest('label'); if(lab) lab.classList.toggle('done',done);
    if(!done){ if(id.indexOf('self-')===0) self++; if(id.indexOf('mem-')===0) mem++; left++; }
  });
  const hp=Math.max(0,Math.min(100,100-self*10-mem*5));
  const f=document.getElementById('hpfill'), v=document.getElementById('hpval'), n=document.getElementById('hpnote');
  if(f){f.style.width=hp+'%';f.className='hpfill '+(hp>=80?'ok':(hp>=50?'warn':'bad'));}
  if(v)v.textContent=hp;
  if(n)n.textContent='自分の期限切れ '+self+'件 ×-10 ／ メンバー切れ '+mem+'件 ×-5 ／ 毎朝100にリセット';
  const p=document.getElementById('prog');
  if(p)p.textContent=left?('残り '+left+' 件'):'🎉 全部やりきった！';
}
function wire(){
  [].slice.call(document.querySelectorAll('#content input[type=checkbox][data-id]')).forEach(function(b){
    b.addEventListener('change',function(){const s=loadState();if(b.checked)s[b.dataset.id]=1;else delete s[b.dataset.id];saveState(s);refresh();});
  });
  refresh();
}
function b64(x){return Uint8Array.from(atob(x),function(c){return c.charCodeAt(0)})}
async function unlock(){
  const btn=document.getElementById('go'), err=document.getElementById('err');
  const pw=document.getElementById('pw').value;
  err.textContent=''; btn.disabled=true; btn.textContent='復号中…';
  try{
    const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){ err.textContent='パスフレーズが違います'; btn.disabled=false; btn.textContent='開く'; }
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('go').addEventListener('click',unlock);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
  document.getElementById('pw').focus();
});
</script></body></html>
