<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 朝ブリーフ</title>
<style>
:root{--red:#e53935;--orange:#fb8c00;--yellow:#fdd835;--green:#43a047;--ink:#22303a;--muted:#6b7c88;--card:#ffffff;--bg:#eef3f6;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;line-height:1.7;}
.wrap{max-width:860px;margin:0 auto;padding:0 16px 48px;}
header.hero{background:linear-gradient(135deg,#2b6cb0 0%,#4c9be0 55%,#63c7b8 100%);color:#fff;border-radius:0 0 22px 22px;padding:30px 26px 26px;box-shadow:0 8px 24px rgba(43,108,176,.28);}
.hero .date{font-size:14px;letter-spacing:.08em;opacity:.95;}
.hero h1{margin:6px 0 14px;font-size:26px;font-weight:800;}
.hero .quote{background:rgba(255,255,255,.16);border-left:4px solid #fff;border-radius:10px;padding:12px 16px;font-size:15px;}
.hero .quote .src{display:block;margin-top:6px;font-size:12px;opacity:.9;}
.card{background:var(--card);border-radius:16px;padding:20px 22px;margin:18px 0;box-shadow:0 3px 12px rgba(34,48,58,.08);}
.card h2{margin:0 0 14px;font-size:19px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #eef3f6;padding-bottom:10px;}
.alert-self{border-left:6px solid var(--red);}
.alert-self h2{color:var(--red);}
.alert-mem{border-left:6px solid var(--orange);}
.alert-mem h2{color:var(--orange);}
ul{margin:8px 0;padding-left:20px;}
li{margin:6px 0;}
.over{color:var(--red);font-weight:700;}
table{width:100%;border-collapse:collapse;margin-top:6px;font-size:14px;}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid #eef3f6;vertical-align:top;}
th{background:#f5f9fb;color:var(--muted);font-weight:700;}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;}
.b-red{background:var(--red);}.b-yellow{background:#f4b400;}.b-green{background:var(--green);}.b-blue{background:#4c9be0;}
.comment{background:#f0f7ff;border-radius:12px;padding:14px 16px;font-size:14.5px;}
a{color:#2b6cb0;}
.src-list{font-size:13px;color:var(--muted);}
footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;}
</style>
<style>
#lockgate{position:fixed;inset:0;background:linear-gradient(135deg,#2b6cb0,#63c7b8);display:flex;align-items:center;justify-content:center;z-index:9999;}
#lockbox{background:#fff;border-radius:16px;padding:32px 28px;box-shadow:0 12px 40px rgba(0,0,0,.25);width:min(90vw,360px);text-align:center;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;}
#lockbox h1{font-size:20px;margin:0 0 6px;color:#22303a;}
#lockbox p{font-size:13px;color:#6b7c88;margin:0 0 18px;}
#pw{width:100%;padding:12px;font-size:16px;border:1px solid #ccd7de;border-radius:10px;box-sizing:border-box;}
#go{margin-top:14px;width:100%;padding:12px;font-size:15px;font-weight:700;color:#fff;background:#2b6cb0;border:none;border-radius:10px;cursor:pointer;}
#go:hover{background:#255c96;}
#err{color:#e53935;font-size:13px;margin-top:12px;min-height:18px;}
</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate">
  <div id="lockbox">
    <h1>🔒 朝ブリーフ</h1>
    <p>パスフレーズを入力してください</p>
    <input id="pw" type="password" placeholder="パスフレーズ" autocomplete="off" />
    <button id="go">開く</button>
    <div id="err"></div>
  </div>
</div>

function b64(s){const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function unlock(){
  const err=document.getElementById('err');err.textContent='';
  const pass=document.getElementById('pw').value;
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pass),{name:'PBKDF2'},false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
    const html=new TextDecoder().decode(pt);
    document.getElementById('content').innerHTML=html;
    document.getElementById('lockgate').style.display='none';
  }catch(e){err.textContent='パスフレーズが違います';}
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
document.getElementById('pw').focus();
</script>
</body>
</html>
