<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 朝ブリーフ</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2430; --sub:#5b6478;
    --line:#e4e8f0; --red:#d32f2f; --redbg:#fdecec; --org:#e8760a; --orgbg:#fff4e5;
    --blue:#2563eb; --green:#178a4c; --yellow:#c99700;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0 0 48px;background:var(--bg);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    line-height:1.75;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:940px;margin:0 auto;padding:0 16px;}
  header.hero{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 45%,#db2777 100%);
    color:#fff;padding:34px 16px 28px;margin-bottom:22px;box-shadow:0 4px 18px rgba(79,70,229,.28);}
  .hero-in{max-width:940px;margin:0 auto;}
  .hero .date{font-size:14px;letter-spacing:.14em;opacity:.9;}
  .hero h1{margin:6px 0 16px;font-size:30px;font-weight:800;letter-spacing:.02em;}
  .quote{background:rgba(255,255,255,.16);border-left:4px solid rgba(255,255,255,.75);
    border-radius:0 10px 10px 0;padding:12px 16px;font-size:15px;}
  .quote .src{display:block;margin-top:6px;font-size:12.5px;opacity:.85;}

  .hpwrap{background:rgba(0,0,0,.18);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
  .hprow{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;}
  .hplabel{font-size:13px;font-weight:800;letter-spacing:.18em;opacity:.9;}
  .hpnum{font-size:14px;opacity:.95;}
  .hpnum b{font-size:24px;font-weight:800;}
  .hpbar{height:12px;background:rgba(0,0,0,.35);border-radius:999px;overflow:hidden;}
  .hpfill{height:100%;border-radius:999px;background:#ffd23f;transition:width .45s ease,background .45s ease;}
  .hpfill.ok{background:#4ade80;} .hpfill.warn{background:#ffd23f;} .hpfill.bad{background:#ff5f56;}
  .hpcalc{margin-top:8px;font-size:12px;opacity:.8;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:20px 22px;margin-bottom:18px;box-shadow:0 1px 3px rgba(20,30,60,.05);}
  .card h2{margin:0 0 14px;font-size:18px;font-weight:800;padding-bottom:10px;border-bottom:2px solid var(--line);}
  .card.alert-self{border-color:#f2b8b8;background:var(--redbg);}
  .card.alert-self h2{color:var(--red);border-bottom-color:#f2b8b8;}
  .card.alert-mem{border-color:#f6d3a4;background:var(--orgbg);}
  .card.alert-mem h2{color:var(--org);border-bottom-color:#f6d3a4;}
  .card.boss{border-color:#7f1d1d;background:#2b0f10;color:#fde8e8;}
  .card.boss h2{color:#ff8f8f;border-bottom-color:#7f1d1d;}
  .bossname{font-size:23px;font-weight:800;color:#fff;}
  .bosssub{margin:6px 0 0;font-size:13.5px;color:#f0b9b9;}

  .lv{display:inline-block;background:#7f1d1d;color:#ffd9d9;font-size:12px;font-weight:800;
    padding:1px 9px;border-radius:999px;vertical-align:2px;}
  .boss .lv{background:#ff5f56;color:#3b0708;}

  ul.mon,ul.todo{list-style:none;margin:0;padding:0;}
  ul.mon li,ul.todo li{border-bottom:1px solid rgba(0,0,0,.07);display:flex;align-items:flex-start;gap:10px;}
  ul.mon li:last-child,ul.todo li:last-child{border-bottom:none;}
  ul.mon label,ul.todo label{flex:1;display:flex;gap:11px;align-items:flex-start;padding:11px 2px;cursor:pointer;min-width:0;}
  .nlink{flex:0 0 auto;align-self:center;font-size:12px;font-weight:800;text-decoration:none;
    color:#1f2430;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.12);
    padding:4px 10px;border-radius:999px;white-space:nowrap;}
  .nlink:hover{background:rgba(0,0,0,.12);}
  ul.mon input,ul.todo input{margin:5px 0 0;width:19px;height:19px;flex:0 0 auto;cursor:pointer;accent-color:#178a4c;}
  .mtxt{flex:1;font-size:14.5px;}
  .msub{display:block;font-size:12.5px;color:var(--sub);font-weight:400;margin-top:2px;}
  label.done .mtxt{text-decoration:line-through;opacity:.42;}
  label.done .lv{background:#9aa1ad;color:#fff;}
  .prog{margin:12px 0 0;font-size:13px;font-weight:800;color:var(--green);}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top;}
  th{background:rgba(0,0,0,.035);font-weight:700;font-size:13px;color:var(--sub);white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .over{color:var(--red);font-weight:800;}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap;}
  .b-red{background:#fde0e0;color:#b91c1c;} .b-yel{background:#fdf0c8;color:#8a6a00;}
  .b-grn{background:#d9f2e3;color:#146c3e;} .b-blu{background:#dde7fd;color:#1d4ed8;}
  ul{margin:0;padding-left:1.25em;} li{margin-bottom:7px;}
  .today li{font-size:15px;} .today b{color:var(--red);}
  .comment p{margin:0 0 12px;font-size:14.5px;} .comment p:last-child{margin-bottom:0;}
  .comment strong{color:var(--red);}
  .muted{color:var(--sub);font-size:14px;margin:12px 0 0;}
  a{color:var(--blue);}
  .src-list li{font-size:13.5px;word-break:break-all;}
  @media(max-width:600px){
    .hero h1{font-size:23px;} .card{padding:16px;} th,td{padding:7px 6px;font-size:13px;}
    .bossname{font-size:20px;}
  }

#lockgate{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 45%,#db2777 100%);display:flex;align-items:center;justify-content:center;}
#lockbox{background:#fff;border-radius:16px;padding:32px 28px;width:min(360px,88vw);box-shadow:0 12px 40px rgba(0,0,0,.3);text-align:center;}
#lockbox h1{margin:0 0 6px;font-size:20px;font-weight:800;color:#1f2430;}
#lockbox p{margin:0 0 18px;font-size:13px;color:#5b6478;}
#lockbox input{width:100%;padding:11px 13px;font-size:15px;border:1.5px solid #e4e8f0;border-radius:9px;outline:none;font-family:inherit;}
#lockbox input:focus{border-color:#7c3aed;}
#lockbox button{width:100%;margin-top:12px;padding:11px;font-size:15px;font-weight:800;color:#fff;background:#7c3aed;border:none;border-radius:9px;cursor:pointer;font-family:inherit;}
#lockbox button:hover{background:#6d28d9;}
#lockerr{margin-top:10px;font-size:13px;color:#d32f2f;font-weight:700;min-height:19px;}
</style>
</head>
<body>
<div id="content"></div>
<div id="lockgate">
  <div id="lockbox">
    <h1>🔒 朝ブリーフ</h1>
    <p>パスフレーズを入力してください</p>
    <input type="password" id="pw" autocomplete="off" autofocus>
    <button id="go">開く</button>
    <div id="lockerr"></div>
  </div>
</div>

const SKEY='brief-2026-07-17';
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));

function loadState(){ try{ return JSON.parse(localStorage.getItem(SKEY))||{}; }catch(e){ return {}; } }
function saveState(s){ try{ localStorage.setItem(SKEY,JSON.stringify(s)); }catch(e){} }

function refresh(){
  const boxes=[...document.querySelectorAll('#content input[type=checkbox]')];
  let hp=100;
  boxes.forEach(b=>{
    const id=b.dataset.id;
    b.closest('label').classList.toggle('done',b.checked);
    if(b.checked) return;
    if(id.startsWith('self-')) hp-=10;
    else if(id.startsWith('mem-')) hp-=5;
  });
  hp=Math.max(0,Math.min(100,hp));
  const val=document.getElementById('hpval'), fill=document.getElementById('hpfill');
  if(val) val.textContent=hp;
  if(fill){ fill.style.width=hp+'%'; fill.className='hpfill '+(hp>=80?'ok':hp>=50?'warn':'bad'); }
  const todo=boxes.filter(b=>b.dataset.id.startsWith('td-'));
  const left=todo.filter(b=>!b.checked).length;
  const p=document.getElementById('prog');
  if(p) p.textContent = left===0 ? '全部やりきった！' : '残り '+left+' 件';
}

function wire(){
  const st=loadState();
  document.querySelectorAll('#content input[type=checkbox]').forEach(b=>{
    b.checked=!!st[b.dataset.id];
    b.addEventListener('change',()=>{
      const s=loadState(); s[b.dataset.id]=b.checked; saveState(s); refresh();
    });
  });
  refresh();
}

async function unlock(){
  const err=document.getElementById('lockerr'); err.textContent='';
  const pw=document.getElementById('pw').value;
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('lockgate').style.display='none';
    wire();
  }catch(e){ err.textContent='パスフレーズが違います'; }
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
