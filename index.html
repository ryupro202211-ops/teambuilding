<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  background: #f7f7f5; color: #1f1f1f; line-height: 1.5;
  padding: 16px; max-width: 900px; margin: 0 auto;
}
header { margin-bottom: 16px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #787774; }
.src-link { display: inline-block; margin-top: 7px; font-size: 12px; font-weight: 600; color: #1a7f4b; background: #e6f4ec; border: 1px solid #bfe3cf; padding: 4px 11px; border-radius: 6px; text-decoration: none; }
.src-link:hover { background: #d6ecdf; }
.toolbar { display: flex; gap: 8px; margin: 14px 0; flex-wrap: wrap; align-items: center; }
#search {
  flex: 1; min-width: 160px; padding: 9px 12px; font-size: 14px;
  border: 1px solid #e0e0dc; border-radius: 8px; background: #fff;
}
#search:focus { outline: none; border-color: #a5a5a0; }
.btn {
  padding: 8px 12px; font-size: 13px; border: 1px solid #e0e0dc;
  background: #fff; border-radius: 8px; cursor: pointer; color: #37352f;
}
.btn:hover { background: #f0f0ee; }
.cat { margin-bottom: 12px; border: 1px solid #ececea; border-radius: 12px; overflow: hidden; background: #fff; }
.cat-head {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  cursor: pointer; user-select: none; background: #fff;
}
.cat-head:hover { background: #fafafa; }
.chev { transition: transform .18s; font-size: 12px; color: #9b9a97; width: 12px; transform: rotate(90deg); }
.cat.collapsed .chev { transform: rotate(0deg); }
.cat.collapsed .cat-body { display: none; }
.badge-cat { font-weight: 700; font-size: 15px; width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; }
.A .badge-cat { background: #e0574a; }
.B .badge-cat { background: #e0803a; }
.C .badge-cat { background: #d9a628; }
.cat-title { font-weight: 600; font-size: 15px; }
.cat-count { font-size: 12px; color: #908f8c; background: #f1f1ef; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
.cat-body { padding: 6px 12px 14px; }
.card {
  border: 1px solid #efefed; border-radius: 10px; padding: 12px 14px; margin: 8px 0;
  background: #fcfcfb;
}
.card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.name { font-weight: 700; font-size: 15px; }
.catfilter { display: flex; align-items: center; gap: 8px; margin: 0 0 14px; flex-wrap: wrap; }
.cf-label { font-size: 12px; color: #787774; margin-right: 2px; }
.cf { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600; padding: 5px 11px; border: 1px solid #e0e0dc; border-radius: 20px; cursor: pointer; user-select: none; background: #fff; }
.cf input { accent-color: #6a51b3; cursor: pointer; }
.cf-A { color: #b23a2e; } .cf-B { color: #b25f1e; } .cf-C { color: #9a7414; } .cf-D { color: #2f5bbf; }
.cbadge { font-weight: 700; font-size: 11px; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; color: #fff; }
.cbadge.A { background: #e0574a; } .cbadge.B { background: #e0803a; } .cbadge.C { background: #d9a628; } .cbadge.D { background: #4a7fe0; }
.empty { text-align: center; color: #9b9a97; padding: 30px; font-size: 14px; }
.pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.p-status { background: #eae6f5; color: #6a51b3; }
.p-sex-m { background: #e3eefc; color: #3a72c9; }
.p-sex-f { background: #fce3ef; color: #c94b8a; }
.nb { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; color: #fff; letter-spacing: .02em; }
.nb0 { background: #d63a2f; box-shadow: 0 0 0 2px rgba(214,58,47,.18); }
.nb1 { background: #e0662a; }
.nb3 { background: #e0913a; }
.nb7 { background: #c9a227; }
.fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px 16px; margin-top: 6px; }
.f { font-size: 12.5px; color: #4a4945; }
.f .k { color: #98968f; margin-right: 5px; }
.memo { font-size: 12.5px; color: #4a4945; margin-top: 8px; padding: 8px 10px; background: #f4f3f0; border-radius: 8px; border-left: 3px solid #d9c8a0; white-space: pre-wrap; }
.hl { display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: 9px; margin-top: 7px; font-size: 13px; flex-wrap: wrap; }
.hl-action { background: #eaf2fe; border-left: 4px solid #3a72c9; }
.hl-next { background: #fff1e6; border-left: 4px solid #e0803a; }
.hl-label { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 5px; color: #fff; letter-spacing: .02em; }
.hl-action .hl-label { background: #3a72c9; }
.hl-next .hl-label { background: #e0803a; }
.hl-date { font-weight: 800; font-size: 15px; color: #1a1a1a; }
.hl-what { color: #45443f; font-weight: 600; }
.det { margin-top: 9px; }
.det summary { cursor: pointer; font-size: 12px; color: #787774; list-style: none; padding: 4px 2px; user-select: none; }
.det summary::-webkit-details-marker { display: none; }
.det summary::before { content: "\25B8 "; color: #9b9a97; }
.det[open] summary::before { content: "\25BE "; }
.det-body { padding-top: 6px; }
.f.wide { grid-column: 1 / -1; }
.f.miss { background: #fff4f4; border: 1px solid #f3cfca; border-radius: 6px; padding: 3px 8px; }
.f.miss .k { color: #c0392b; }
.blank { background: #f6d5d0; color: #b0281c; font-weight: 700; font-size: 11px; padding: 1px 7px; border-radius: 5px; }
.miss-badge { font-size: 11px; color: #c0392b; font-weight: 600; margin-left: 4px; }
.events-box { margin-bottom: 14px; border: 1px solid #e6e2d9; border-radius: 12px; overflow: hidden; background: #fffdf7; }
.events-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; }
.events-head:hover { background: #fdf9ee; }
.events-title { font-weight: 700; font-size: 15px; }
.events-count { font-size: 12px; color: #9a8a5c; background: #f3ecd8; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
.events-box.collapsed .events-body { display: none; }
.events-box.collapsed .chev { transform: rotate(0deg); }
.ev { display: flex; gap: 12px; padding: 10px 14px; border-top: 1px solid #f0ebdd; }
.ev-date { flex: 0 0 auto; width: 50px; text-align: center; }
.ev-d { font-weight: 800; font-size: 16px; color: #b8860b; line-height: 1.1; }
.ev-dow { font-size: 11px; color: #9a8a5c; }
.ev-body { flex: 1; min-width: 0; }
.ev-title { font-weight: 700; font-size: 14px; }
.ev-theme { font-size: 11px; color: #6a51b3; background: #eae6f5; padding: 1px 7px; border-radius: 20px; margin-left: 6px; white-space: nowrap; }
.ev-meta { font-size: 12.5px; color: #4a4945; margin-top: 2px; }
.ev-link { font-size: 12px; color: #2f6bcc; text-decoration: none; margin-top: 3px; display: inline-block; word-break: break-all; }
.ev-link:hover { text-decoration: underline; }
.ev-sheet { display: inline-block; margin-top: 5px; font-size: 12px; color: #1a7f4b; background: #e6f4ec; border: 1px solid #bfe3cf; padding: 3px 10px; border-radius: 6px; text-decoration: none; font-weight: 600; }
.ev-sheet:hover { background: #d6ecdf; }
.ev { align-items: flex-start; }
.evchk { margin-top: 4px; width: 16px; height: 16px; accent-color: #b8860b; cursor: pointer; flex: 0 0 auto; }
.ev-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 12px 14px 4px; border-top: 1px solid #f0ebdd; }
.btn-primary { background: #b8860b; color: #fff; border-color: #b8860b; }
.btn-primary:hover { background: #a5790a; }
.ev-status { font-size: 12px; color: #9a8a5c; }
.ev-text { display: block; width: calc(100% - 28px); margin: 4px 14px 14px; min-height: 130px; font-size: 12.5px; font-family: inherit; line-height: 1.5; border: 1px solid #e6e2d9; border-radius: 8px; padding: 10px 12px; background: #fff; color: #333; resize: vertical; box-sizing: border-box; }
footer { margin-top: 18px; font-size: 11px; color: #b0afab; text-align: center; }

/* ===== 人脈ガーデン ===== */
.tabs { display: flex; gap: 6px; margin: 0 0 14px; border-bottom: 1px solid #e6e6e2; }
.tab { padding: 9px 18px; font-size: 14px; font-weight: 600; border: 0; background: none; cursor: pointer; color: #8b8a86; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab:hover { color: #4a7c40; }
.tab.active { color: #2f6b28; border-bottom-color: #4c9a3f; }
body.view-garden #listwrap { display: none; }
body.view-list #gardenwrap { display: none; }

.gd-sky { background: linear-gradient(180deg,#eaf6e4 0%, #f4faf0 100%); border: 1px solid #dbead3; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.gd-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.gd-stat { background: #fff; border: 1px solid #dbead3; border-radius: 10px; padding: 8px 13px; font-size: 12px; color: #557050; }
.gd-stat b { display: block; font-size: 19px; font-weight: 800; color: #2f6b28; line-height: 1.2; }
.gd-stat.warn b { color: #c0392b; }
.gd-stat.thirsty b { color: #b8860b; }

.gd-call { background: #fff8e6; border: 1px solid #f0dfae; border-left: 4px solid #e0a93a; border-radius: 10px; padding: 11px 14px; margin-bottom: 12px; }
.gd-call-t { font-size: 13px; font-weight: 700; color: #8a6318; margin-bottom: 6px; }
.gd-call-list { display: flex; gap: 6px; flex-wrap: wrap; }
.gd-chip { background: #fff; border: 1px solid #ecd9a4; border-radius: 20px; padding: 3px 11px; font-size: 12px; color: #6b5310; cursor: pointer; font-weight: 600; }
.gd-chip:hover { background: #fdf3dc; }
.gd-none { font-size: 13px; color: #557050; }

.garden { display: grid; grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); gap: 6px; }
.plant { position: relative; border: 0; background: none; padding: 8px 2px 6px; cursor: pointer; border-radius: 10px; text-align: center; font-family: inherit; }
.plant:hover { background: rgba(255,255,255,.65); }
.plant.sel { background: #fff; box-shadow: 0 0 0 2px #4c9a3f; }
.plant-emoji { font-size: 30px; line-height: 1.15; display: block; transition: transform .2s; }
.plant-name { display: block; max-width: 100%; font-size: 11px; color: #3f5c3a; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
.plant-soil { display: block; height: 4px; border-radius: 3px; background: #dfe6db; margin: 4px 6px 0; overflow: hidden; }
.plant-soil i { display: block; height: 4px; border-radius: 3px; }
.st-fresh .plant-soil i { background: #4c9a3f; }
.st-ok .plant-soil i { background: #8bbf5c; }
.st-thirsty .plant-soil i { background: #e0a93a; }
.st-wilting .plant-soil i { background: #d97a2a; }
.st-dying .plant-soil i { background: #c0392b; }
.st-thirsty .plant-emoji { transform: rotate(-6deg); }
.st-wilting .plant-emoji { transform: rotate(-14deg); filter: saturate(.55); opacity: .85; }
.st-dying .plant-emoji { transform: rotate(-24deg); filter: saturate(.2) brightness(.9); opacity: .6; }
.plant-drop { position: absolute; top: 4px; left: 50%; margin-left: 11px; font-size: 12px; animation: bob 1.4s ease-in-out infinite; pointer-events: none; }
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
.gd-cat-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; font-size: 11px; color: #6b8265; }
.gd-cat-legend span { white-space: nowrap; }

.gd-panel { background: #fff; border: 1px solid #dbead3; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.gd-panel-head { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 4px; }
.gd-big { font-size: 32px; }
.gd-panel-name { font-weight: 800; font-size: 17px; }
.gd-kind { font-size: 11px; background: #eaf3e5; color: #3f7a33; padding: 2px 9px; border-radius: 20px; font-weight: 700; }
.gd-state { font-size: 12.5px; font-weight: 700; margin-left: auto; }
.gd-state.st-fresh, .gd-state.st-ok { color: #2f6b28; }
.gd-state.st-thirsty { color: #b8860b; }
.gd-state.st-wilting { color: #c9691f; }
.gd-state.st-dying { color: #c0392b; }
.gd-msg { font-size: 13px; color: #4a5947; background: #f4f9f1; border-radius: 8px; padding: 8px 11px; margin: 8px 0; }
.gd-water { background: #2f8fd6; color: #fff; border: 0; border-radius: 8px; padding: 9px 16px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
.gd-water:hover { background: #2578b5; }
.gd-water.done { background: #7fae72; }
.gd-undo { background: none; border: 0; color: #8b8a86; font-size: 12px; cursor: pointer; text-decoration: underline; margin-left: 8px; font-family: inherit; }
.gd-log { font-size: 11.5px; color: #8b8a86; margin-top: 6px; }
</style>
</head>

<header>
  <h1>🌱 人脈ガーデン</h1>
  <div class="sub">一人ひとりが一株の植物です。アクション日を過ぎるとしおれていきます。水をやって育てましょう。</div>
  <a class="src-link" href="https://docs.google.com/spreadsheets/d/1vjDb8_5WTfVffwW2iJGLnL_squUAGLRxhAfY_oveHYw/edit?gid=0#gid=0" target="_blank" rel="noopener">📊 元データ（人脈リスト）を開く</a>
</header>
<div class="tabs" id="tabs">
  <button class="tab active" data-view="garden">🌱 庭</button>
  <button class="tab" data-view="list">📋 リスト</button>
</div>
<div class="toolbar">
  <input id="search" type="text" placeholder="名前・仕事・出会い・メモなどで検索…">
  <select class="btn" id="sort">
    <option value="">並べ替え：カテゴリ順</option>
    <option value="action">アクション日が近い順</option>
    <option value="next">次会う日が近い順</option>
  </select>
</div>
<div class="catfilter" id="catfilter">
  <span class="cf-label">表示カテゴリ</span>
  <label class="cf cf-A"><input type="checkbox" value="A" checked>A</label>
  <label class="cf cf-B"><input type="checkbox" value="B" checked>B</label>
  <label class="cf cf-C"><input type="checkbox" value="C" checked>C</label>
  <label class="cf cf-D"><input type="checkbox" value="D" checked>D</label>
</div>
<div id="events"></div>
<div id="gardenwrap">
  <div id="gdpanel"></div>
  <div class="gd-sky">
    <div class="gd-stats" id="gdstats"></div>
    <div id="gdcall"></div>
    <div class="garden" id="garden"></div>
    <div class="gd-cat-legend">
      <span>🌹 A＝手のかかる花（14日周期）</span>
      <span>🌷 B＝つぼみ（30日）</span>
      <span>🪴 C＝観葉植物（90日）</span>
      <span>🌿 D＝野草（120日）</span>
    </div>
  </div>
</div>
<div id="listwrap"><div id="app"></div></div>
<footer id="foot"></footer>

  function b2u(b){ const s=atob(b); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; }
  const form=document.getElementById("lockform"), err=document.getElementById("lockerr"), btn=document.getElementById("lockbtn");

      const km=await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);

      const pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b2u(ENC.iv)}, key, b2u(ENC.ct));

      document.getElementById("lockgate").style.display="none";
      renderEvents(); setView("garden");
    } catch(e) {

function buildInviteText(){

  document.querySelectorAll(".evchk").forEach(function(chk){

    var e = EVENTS[+chk.dataset.i];

    var when = e.d + "(" + e.dow + ") " + e.t + " @" + e.place;
    blocks.push(head + "\n" + when + (e.url ? "\n" + e.url : ""));
  });
  return blocks.join("\n\n");
}

  function done(){ document.getElementById("evStatus").textContent = "コピーしました ✓"; }
  function fallback(){
    ta.removeAttribute("readonly"); ta.focus(); ta.select();
    try { document.execCommand("copy"); done(); } catch(err){ document.getElementById("evStatus").textContent = "コピーできませんでした。テキストを手動で選択してください"; }
    ta.setAttribute("readonly","readonly");
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(done, fallback);
  } else { fallback(); }
}

const FULL_DETAIL = [

  ["最寄駅","最寄駅", false, false],
  ["一人暮らしor実家","一人暮らしor実家", false, false],
  ["土日休みorシフト","土日休みorシフト", false, false],
  ["仕事(O)","仕事（O）", false, false],
  ["趣味・部活(R)","趣味・部活（R）", false, false],
  ["お金の価値観(M)","お金の価値観（M）", false, false],
  ["目標(D)","目標（D）", false, false],
  ["出身地・家族(F)","出身地・家族（F）", true, false],
  ["出会い(どこで)","出会い（どこで）", false, false],
  ["出会い(誰と)","出会い（誰と）", false, false],

  ["誕生日","誕生日", false, false],
  ["LINE/Insta名","LINE/Insta名", false, true],

];

function esc(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function parseDate(str){
  if(!str) return null;
  var s = String(str).trim().replace(/[.\-]/g,"/");
  var m = s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if(m){ return new Date(+m[1], +m[2]-1, +m[3]); }
  m = s.match(/(\d{1,2})\/(\d{1,2})/);
  if(m){
    var now = new Date();
    return new Date(now.getFullYear(), +m[1]-1, +m[2]);
  }
  return null;
}

function daysUntil(str){
  var d = parseDate(str);
  if(!d) return null;
  var today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function nextBadge(str){
  var n = daysUntil(str);
  if(n===null || n<0 || n>7) return "";
  var cls, label;
  if(n===0){ cls="nb0"; label="当日"; }
  else if(n===1){ cls="nb1"; label="前日"; }
  else if(n<=3){ cls="nb3"; label="3日前"; }
  else { cls="nb7"; label="7日前"; }
  return '<span class="nb '+cls+'">'+label+'</span>';
}

var SEARCH_KEYS = ["名前(あだ名)","仕事(O)","出会い(どこで)","出会い(誰と)","メモ","履歴","ステータス","最寄駅","出身地・家族(F)","趣味・部活(R)","目標(D)","お金の価値観(M)"];

function matchSearch(o){
  if(!SEARCH) return true;
  var hay = SEARCH_KEYS.map(function(k){ return o[k]||""; }).join(" ").toLowerCase();
  return hay.indexOf(SEARCH) !== -1;
}

function sexPill(v){
  if(!v) return "";
  if(v.indexOf("男")!==-1) return '<span class="pill p-sex-m">'+esc(v)+'</span>';
  if(v.indexOf("女")!==-1) return '<span class="pill p-sex-f">'+esc(v)+'</span>';
  return '<span class="pill">'+esc(v)+'</span>';
}

function detailHTML(o){
  var rows = FULL_DETAIL.map(function(f){
    var key=f[0], label=f[1], wide=f[2], hideEmpty=f[3];
    var val = o[key];
    var has = val!=null && String(val).trim()!=="";
    if(!has && hideEmpty) return "";
    var cls = "f" + (wide?" wide":"") + (has?"":" miss");
    var inner;
    if(has){
      if(key==="Insta URL"){
        inner = '<a href="'+esc(val)+'" target="_blank" rel="noopener">'+esc(val)+'</a>';
      } else {
        inner = esc(val);
      }
    } else {
      inner = '<span class="blank">空欄</span>';
    }
    return '<div class="'+cls+'"><span class="k">'+esc(label)+'</span>'+inner+'</div>';
  }).join("");
  var missCount = FULL_DETAIL.filter(function(f){
    if(f[3]) return false;
    var v=o[f[0]]; return !(v!=null && String(v).trim()!=="");
  }).length;
  var missBadge = missCount ? '<span class="miss-badge">空欄 '+missCount+'</span>' : "";
  return '<details class="det"><summary>詳細を表示'+missBadge+'</summary>'
    + '<div class="det-body"><div class="fields">'+rows+'</div></div></details>';
}

function checkedCats(){
  var s = {};
  document.querySelectorAll("#catfilter input:checked").forEach(function(c){ s[c.value]=true; });
  return s;
}

function sortByDate(list, key){
  return list.slice().sort(function(a,b){
    var da=daysUntil(a[key]), db=daysUntil(b[key]);
    var va = (da===null)?Infinity:da;
    var vb = (db===null)?Infinity:db;
    return va-vb;
  });
}

  if(VIEW === "garden") renderGarden();
}

/* ===================== 人脈ガーデン ===================== */

var PLANT_META = {
  A: { kind:"手のかかる花", cycle:14,  emo:"🌹", wilt:"🥀" },
  B: { kind:"つぼみ",       cycle:30,  emo:"🌷", wilt:"🥀" },
  C: { kind:"観葉植物",     cycle:90,  emo:"🪴", wilt:"🍂" },
  D: { kind:"野草",         cycle:120, emo:"🌿", wilt:"🍂" }
};
var WATER_KEY = "jinmyaku_garden_water_v1";
var VIEW = "garden";
var SELECTED = null;

function loadWater(){
  try { return JSON.parse(localStorage.getItem(WATER_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveWater(w){
  try { localStorage.setItem(WATER_KEY, JSON.stringify(w)); } catch(e){}
}
/* 日次でデータが再生成されても壊れないキー（並び順に依存しない） */
function plantKey(o){
  return [o["名前(あだ名)"]||"", o["カテゴリー"]||"", o["出会った日"]||""].join("|");
}
function todayISO(){
  var d = new Date();
  return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
}
function isoToDate(s){
  var m = String(s||"").match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}
function daysBetween(a, b){
  a = new Date(a); b = new Date(b);
  a.setHours(0,0,0,0); b.setHours(0,0,0,0);
  return Math.round((b - a) / 86400000);
}

/* 株の状態を計算。
   期日 = 水やり済みなら「最終水やり日＋カテゴリ周期」、未なら アクション日。
   overdue = 今日 − 期日（プラスなら水切れ） */
function plantState(o, water){
  var cat = o["カテゴリー"] || "D";
  var meta = PLANT_META[cat] || PLANT_META.D;
  var today = new Date(); today.setHours(0,0,0,0);
  var wISO = water[plantKey(o)];
  var wDate = isoToDate(wISO);
  var due, basis;
  if(wDate){
    due = new Date(wDate); due.setDate(due.getDate() + meta.cycle);
    basis = "watered";
  } else {
    due = parseDate(o["アクション日"]);
    basis = "action";
  }
  var overdue = due ? daysBetween(due, today) : 0;
  var grace = Math.ceil(meta.cycle / 3);
  var r = overdue / grace;
  var st, label, msg;
  if(overdue < 0){ st="st-fresh"; label="元気"; msg="いきいきしています。次の水やりは "+fmtDate(due)+" ごろ。"; }
  else if(overdue === 0){ st="st-ok"; label="水やり日"; msg="今日が水やりの日です。"; }
  else if(r <= 1){ st="st-thirsty"; label="のどが渇いた"; msg=overdue+"日 水をもらえていません。そろそろ声をかけて。"; }
  else if(r <= 2){ st="st-wilting"; label="しおれてきた"; msg=overdue+"日 放置ぎみ。葉が垂れてきました。"; }
  else { st="st-dying"; label="枯れかけ"; msg=overdue+"日 も水切れ。今すぐ水やりを。"; }
  /* 土の残り水分（0〜100%） */
  var moist;
  if(overdue < 0) moist = 100;
  else moist = Math.max(0, Math.round(100 - (overdue / (grace*3)) * 100));
  return { cat:cat, meta:meta, st:st, label:label, msg:msg, overdue:overdue, moist:moist,
           due:due, basis:basis, watered:wISO || null, thirsty:(overdue > 0) };
}
function fmtDate(d){
  return d ? (d.getMonth()+1)+"/"+d.getDate() : "—";
}
function plantEmoji(s){
  return (s.st==="st-wilting" || s.st==="st-dying") ? s.meta.wilt : s.meta.emo;
}

function gardenList(){
  var cats = checkedCats();
  return DATA.filter(function(o){ return cats[o["カテゴリー"]] && matchSearch(o); });
}

function renderGarden(){
  var water = loadWater();
  var list = gardenList();
  var states = list.map(function(o){ return { o:o, s:plantState(o, water) }; });

  /* 乾いている株を優先、その中で放置日数が多い順 */
  var thirsty = states.filter(function(x){ return x.s.thirsty; })
                      .sort(function(a,b){ return b.s.overdue - a.s.overdue; });
  var dying = states.filter(function(x){ return x.s.st==="st-dying"; });

  var stats = document.getElementById("gdstats");
  stats.innerHTML =
      '<div class="gd-stat"><b>' + states.length + '</b>庭の株</div>'
    + '<div class="gd-stat"><b>' + (states.length - thirsty.length) + '</b>元気</div>'
    + '<div class="gd-stat thirsty"><b>' + thirsty.length + '</b>水やり待ち</div>'
    + '<div class="gd-stat warn"><b>' + dying.length + '</b>枯れかけ</div>';

  var call = document.getElementById("gdcall");
  if(thirsty.length){
    call.innerHTML = '<div class="gd-call">'
      + '<div class="gd-call-t">💧 「水をちょうだい」と言っています（' + thirsty.length + '株）</div>'
      + '<div class="gd-call-list">'
      + thirsty.slice(0,12).map(function(x){
          return '<button class="gd-chip" data-k="' + esc(plantKey(x.o)) + '">'
               + plantEmoji(x.s) + ' ' + esc(x.o["名前(あだ名)"]||"(名前なし)")
               + ' <span style="opacity:.65">' + x.s.overdue + '日</span></button>';
        }).join("")
      + (thirsty.length > 12 ? '<span class="gd-none">ほか ' + (thirsty.length-12) + '株</span>' : "")
      + '</div></div>';
  } else {
    call.innerHTML = '<div class="gd-call"><div class="gd-none">🎉 いま水やり待ちの株はありません。庭はいい状態です。</div></div>';
  }

  /* 庭の並び：乾いた株ほど手前に */
  var ordered = states.slice().sort(function(a,b){ return b.s.overdue - a.s.overdue; });
  document.getElementById("garden").innerHTML = ordered.map(function(x){
    var k = plantKey(x.o);
    return '<button class="plant ' + x.s.st + (SELECTED===k ? ' sel' : '') + '" data-k="' + esc(k) + '" '
      + 'title="' + esc((x.o["名前(あだ名)"]||"") + " / " + x.s.label) + '">'
      + (x.s.thirsty ? '<span class="plant-drop">💧</span>' : "")
      + '<span class="plant-emoji">' + plantEmoji(x.s) + '</span>'
      + '<span class="plant-name">' + esc(x.o["名前(あだ名)"]||"(名前なし)") + '</span>'
      + '<span class="plant-soil"><i style="width:' + x.s.moist + '%"></i></span>'
      + '</button>';
  }).join("") || '<div class="gd-none">該当する株がありません</div>';

  document.querySelectorAll(".plant, .gd-chip").forEach(function(el){
    el.addEventListener("click", function(){
      SELECTED = this.getAttribute("data-k");
      renderGarden();
      var p = document.getElementById("gdpanel");
      if(p && p.scrollIntoView) p.scrollIntoView({ block:"nearest" });
    });
  });

  renderPanel(water);
  updateFoot(states.length);
}

function renderPanel(water){
  var panel = document.getElementById("gdpanel");
  if(!SELECTED){ panel.innerHTML = ""; return; }
  var o = DATA.filter(function(x){ return plantKey(x)===SELECTED; })[0];
  if(!o){ panel.innerHTML = ""; SELECTED = null; return; }
  var s = plantState(o, water);
  var wateredToday = s.watered === todayISO();
  panel.innerHTML = '<div class="gd-panel">'
    + '<div class="gd-panel-head">'
    + '<span class="gd-big">' + plantEmoji(s) + '</span>'
    + '<span class="gd-panel-name">' + esc(o["名前(あだ名)"]||"(名前なし)") + '</span>'
    + '<span class="gd-kind">' + esc(s.cat) + '・' + esc(s.meta.kind) + '</span>'
    + '<span class="gd-state ' + s.st + '">' + esc(s.label) + '</span>'
    + '</div>'
    + '<div class="gd-msg">' + esc(s.msg) + '</div>'
    + '<button class="gd-water' + (wateredToday ? ' done' : '') + '" id="gdwater">'
    + (wateredToday ? '✅ 今日 水やり済み' : '💧 水をやる（会った・連絡した）')
    + '</button>'
    + (s.watered ? '<button class="gd-undo" id="gdundo">取り消す</button>' : "")
    + '<div class="gd-log">' + (s.watered
        ? '最終水やり：' + esc(s.watered) + '（次の期日 ' + fmtDate(s.due) + '）'
        : 'アクション日 ' + esc(o["アクション日"]||"—") + ' を期日として計算中。水をやるとこの株の周期（' + s.meta.cycle + '日）で再計算されます。')
      + '</div>'
    + cardHTML(o)
    + '</div>';

  var wb = document.getElementById("gdwater");
  if(wb) wb.addEventListener("click", function(){
    var w = loadWater();
    w[SELECTED] = todayISO();
    saveWater(w);
    renderGarden();
  });
  var ub = document.getElementById("gdundo");
  if(ub) ub.addEventListener("click", function(){
    var w = loadWater();
    delete w[SELECTED];
    saveWater(w);
    renderGarden();
  });
}

function setView(v){
  VIEW = v;
  document.body.className = "view-" + v;
  document.querySelectorAll(".tab").forEach(function(t){
    t.classList.toggle("active", t.getAttribute("data-view") === v);
  });
  document.getElementById("sort").style.display = (v==="list") ? "" : "none";
  render();
}

document.querySelectorAll(".tab").forEach(function(t){
  t.addEventListener("click", function(){ setView(this.getAttribute("data-view")); });
});

document.getElementById("search").addEventListener("input", function(){
  SEARCH = this.value.trim().toLowerCase(); render();
});
document.getElementById("sort").addEventListener("change", function(){
  SORT = this.value; render();
});
document.querySelectorAll("#catfilter input").forEach(function(c){
  c.addEventListener("change", render);
});
