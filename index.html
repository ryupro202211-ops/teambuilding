<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人脈リスト A/B/C</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
  background: #f7f7f5; color: #1f1f1f; line-height: 1.5;
  padding: 16px; max-width: 900px; margin: 0 auto;
}
header { margin-bottom: 16px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #787774; }
.toolbar { display: flex; gap: 8px; margin: 14px 0; flex-wrap: wrap; align-items: center; }
#search {
  flex: 1; min-width: 160px; padding: 9px 12px; font-size: 14px;
  border: 1px solid #e0e0dc; border-radius: 8px; background: #fff;
}
#search:focus { outline: none; border-color: #a5a5a0; }
.btn {
  padding: 8px 12px; font-size: 13px; border: 1px solid #e0e0dc;
  background: #fff; border-radius: 8px; cursor: pointer; color: #37352f;
}
.btn:hover { background: #f0f0ee; }
.cat { margin-bottom: 12px; border: 1px solid #ececea; border-radius: 12px; overflow: hidden; background: #fff; }
.cat-head {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  cursor: pointer; user-select: none; background: #fff;
}
.cat-head:hover { background: #fafafa; }
.chev { transition: transform .18s; font-size: 12px; color: #9b9a97; width: 12px; }
.cat.collapsed .chev { transform: rotate(-90deg); }
.cat.collapsed .cat-body { display: none; }
.badge-cat { font-weight: 700; font-size: 15px; width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; }
.A .badge-cat { background: #e0574a; }
.B .badge-cat { background: #e0803a; }
.C .badge-cat { background: #d9a628; }
.cat-title { font-weight: 600; font-size: 15px; }
.cat-count { font-size: 12px; color: #908f8c; background: #f1f1ef; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
.cat-body { padding: 6px 12px 14px; }
.card {
  border: 1px solid #efefed; border-radius: 10px; padding: 12px 14px; margin: 8px 0;
  background: #fcfcfb;
}
.card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.name { font-weight: 700; font-size: 15px; }
.catfilter { display: flex; align-items: center; gap: 8px; margin: 0 0 14px; flex-wrap: wrap; }
.cf-label { font-size: 12px; color: #787774; margin-right: 2px; }
.cf { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600; padding: 5px 11px; border: 1px solid #e0e0dc; border-radius: 20px; cursor: pointer; user-select: none; background: #fff; }
.cf input { accent-color: #6a51b3; cursor: pointer; }
.cf-A { color: #b23a2e; } .cf-B { color: #b25f1e; } .cf-C { color: #9a7414; } .cf-D { color: #2f5bbf; }
.cbadge { font-weight: 700; font-size: 11px; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; color: #fff; }
.cbadge.A { background: #e0574a; } .cbadge.B { background: #e0803a; } .cbadge.C { background: #d9a628; } .cbadge.D { background: #4a7fe0; }
.empty { text-align: center; color: #9b9a97; padding: 30px; font-size: 14px; }
.pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.p-status { background: #eae6f5; color: #6a51b3; }
.p-sex-m { background: #e3eefc; color: #3a72c9; }
.p-sex-f { background: #fce3ef; color: #c94b8a; }
.nb { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; color: #fff; letter-spacing: .02em; }
.nb0 { background: #d63a2f; box-shadow: 0 0 0 2px rgba(214,58,47,.18); }
.nb1 { background: #e0662a; }
.nb3 { background: #e0913a; }
.nb7 { background: #c9a227; }
.fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px 16px; margin-top: 6px; }
.f { font-size: 12.5px; color: #4a4945; }
.f .k { color: #98968f; margin-right: 5px; }
.memo { font-size: 12.5px; color: #4a4945; margin-top: 8px; padding: 8px 10px; background: #f4f3f0; border-radius: 8px; border-left: 3px solid #d9c8a0; white-space: pre-wrap; }
.hl { display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: 9px; margin-top: 7px; font-size: 13px; flex-wrap: wrap; }
.hl-action { background: #eaf2fe; border-left: 4px solid #3a72c9; }
.hl-next { background: #fff1e6; border-left: 4px solid #e0803a; }
.hl-label { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 5px; color: #fff; letter-spacing: .02em; }
.hl-action .hl-label { background: #3a72c9; }
.hl-next .hl-label { background: #e0803a; }
.hl-date { font-weight: 800; font-size: 15px; color: #1a1a1a; }
.hl-what { color: #45443f; font-weight: 600; }
.det { margin-top: 9px; }
.det summary { cursor: pointer; font-size: 12px; color: #787774; list-style: none; padding: 4px 2px; user-select: none; }
.det summary::-webkit-details-marker { display: none; }
.det summary::before { content: "\25B8 "; color: #9b9a97; }
.det[open] summary::before { content: "\25BE "; }
.det-body { padding-top: 6px; }
.f.wide { grid-column: 1 / -1; }
.f.miss { background: #fff4f4; border: 1px solid #f3cfca; border-radius: 6px; padding: 3px 8px; }
.f.miss .k { color: #c0392b; }
.blank { background: #f6d5d0; color: #b0281c; font-weight: 700; font-size: 11px; padding: 1px 7px; border-radius: 5px; }
.miss-badge { font-size: 11px; color: #c0392b; font-weight: 600; margin-left: 4px; }
.events-box { margin-bottom: 14px; border: 1px solid #e6e2d9; border-radius: 12px; overflow: hidden; background: #fffdf7; }
.events-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; }
.events-head:hover { background: #fdf9ee; }
.events-title { font-weight: 700; font-size: 15px; }
.events-count { font-size: 12px; color: #9a8a5c; background: #f3ecd8; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
.events-box.collapsed .events-body { display: none; }
.events-box.collapsed .chev { transform: rotate(-90deg); }
.ev { display: flex; gap: 12px; padding: 10px 14px; border-top: 1px solid #f0ebdd; }
.ev-date { flex: 0 0 auto; width: 50px; text-align: center; }
.ev-d { font-weight: 800; font-size: 16px; color: #b8860b; line-height: 1.1; }
.ev-dow { font-size: 11px; color: #9a8a5c; }
.ev-body { flex: 1; min-width: 0; }
.ev-title { font-weight: 700; font-size: 14px; }
.ev-theme { font-size: 11px; color: #6a51b3; background: #eae6f5; padding: 1px 7px; border-radius: 20px; margin-left: 6px; white-space: nowrap; }
.ev-meta { font-size: 12.5px; color: #4a4945; margin-top: 2px; }
.ev-link { font-size: 12px; color: #2f6bcc; text-decoration: none; margin-top: 3px; display: inline-block; word-break: break-all; }
.ev-link:hover { text-decoration: underline; }
.ev-sheet { display: inline-block; margin-top: 5px; font-size: 12px; color: #1a7f4b; background: #e6f4ec; border: 1px solid #bfe3cf; padding: 3px 10px; border-radius: 6px; text-decoration: none; font-weight: 600; }
.ev-sheet:hover { background: #d6ecdf; }
.ev { align-items: flex-start; }
.evchk { margin-top: 4px; width: 16px; height: 16px; accent-color: #b8860b; cursor: pointer; flex: 0 0 auto; }
.ev-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 12px 14px 4px; border-top: 1px solid #f0ebdd; }
.btn-primary { background: #b8860b; color: #fff; border-color: #b8860b; }
.btn-primary:hover { background: #a5790a; }
.ev-status { font-size: 12px; color: #9a8a5c; }
.ev-text { display: block; width: calc(100% - 28px); margin: 4px 14px 14px; min-height: 130px; font-size: 12.5px; font-family: inherit; line-height: 1.5; border: 1px solid #e6e2d9; border-radius: 8px; padding: 10px 12px; background: #fff; color: #333; resize: vertical; box-sizing: border-box; }
footer { margin-top: 18px; font-size: 11px; color: #b0afab; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>人脈リスト — A / B / C / D</h1>
  <div class="sub">チェックしたカテゴリの人を一覧表示。並べ替えはカテゴリをまたいで適用されます。</div>
</header>
<div class="toolbar">
  <input id="search" type="text" placeholder="名前・仕事・出会い・メモなどで検索…">
  <select class="btn" id="sort">
    <option value="">並べ替え：カテゴリ順</option>
    <option value="action">アクション日が近い順</option>
    <option value="next">次会う日が近い順</option>
  </select>
</div>
<div class="catfilter" id="catfilter">
  <span class="cf-label">表示カテゴリ</span>
  <label class="cf cf-A"><input type="checkbox" value="A" checked>A</label>
  <label class="cf cf-B"><input type="checkbox" value="B" checked>B</label>
  <label class="cf cf-C"><input type="checkbox" value="C" checked>C</label>
  <label class="cf cf-D"><input type="checkbox" value="D" checked>D</label>
</div>
<div id="events"></div>
<div id="app"></div>
<footer id="foot"></footer>
<style>
#lockgate{position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;color:#e2e8f0;}

#lockgate h2{margin:0 0 6px;font-size:18px;}
#lockgate p{margin:0 0 18px;font-size:13px;color:#94a3b8;}
#lockgate input{width:100%;box-sizing:border-box;padding:11px 12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:15px;margin-bottom:12px;}
#lockgate button{width:100%;padding:11px;border:0;border-radius:8px;background:#3b82f6;color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
#lockgate button:hover{background:#2563eb;}
#lockgate .err{display:none;color:#f87171;font-size:13px;margin-top:10px;}
</style>

</div>

function buildInviteText(){
  var blocks = [];
  document.querySelectorAll(".evchk").forEach(function(chk){
    if(!chk.checked) return;
    var e = EVENTS[+chk.dataset.i];
    var head = "■" + e.title + (e.theme ? "（" + e.theme + "）" : "");
    var when = e.d + "(" + e.dow + ") " + e.t + " @" + e.place;
    blocks.push(head + "\n" + when + (e.url ? "\n" + e.url : ""));
  });
  return blocks.join("\n\n");
}

function updateInvite(){
  document.getElementById("evText").value = buildInviteText();
  var n = document.querySelectorAll(".evchk:checked").length;
  document.getElementById("evStatus").textContent = n + " 件選択中";
}

function copyInvite(){
  var ta = document.getElementById("evText");
  if(!ta.value){ document.getElementById("evStatus").textContent = "イベントが選択されていません"; return; }
  function done(){ document.getElementById("evStatus").textContent = "コピーしました ✓"; }
  function fallback(){
    ta.removeAttribute("readonly"); ta.focus(); ta.select();
    try { document.execCommand("copy"); done(); } catch(err){ document.getElementById("evStatus").textContent = "コピーできませんでした。テキストを手動で選択してください"; }
    ta.setAttribute("readonly","readonly");
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(done, fallback);
  } else { fallback(); }
}

function renderEvents(){
  var rows = EVENTS.map(function(e, i){

    var sheet = e.sheet ? '<div><a class="ev-sheet" href="' + esc(e.sheet) + '" target="_blank" rel="noopener">📊 集計シートを開く</a></div>' : "";
    return '<div class="ev">'
      + '<input type="checkbox" class="evchk" data-i="' + i + '" checked>'
      + '<div class="ev-date"><div class="ev-d">' + esc(e.d) + '</div><div class="ev-dow">(' + esc(e.dow) + ')</div></div>'
      + '<div class="ev-body">'
      + '<div class="ev-title">' + esc(e.title) + theme + '</div>'
      + '<div class="ev-meta">' + esc(e.t) + ' ・ ' + esc(e.place) + '</div>'
      + link + sheet
      + '</div></div>';
  }).join("");
  document.getElementById("events").innerHTML =
    '<div class="events-box">'
    + '<div class="events-head"><span class="chev">▶</span><span class="events-title">📅 今後のイベント</span><span class="events-count">' + EVENTS.length + ' 件</span></div>'

    + '<span class="ev-status" id="evStatus"></span>'
    + '</div>'
    + '<textarea class="ev-text" id="evText" readonly></textarea>'
    + '</div></div>';
  document.querySelector(".events-head").addEventListener("click", function(){

  document.getElementById("evNone").addEventListener("click", function(){ document.querySelectorAll(".evchk").forEach(function(c){ c.checked = false; }); updateInvite(); });
  document.getElementById("evCopy").addEventListener("click", copyInvite);
  updateInvite();
}

function esc(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function parseDate(str){
  if(!str) return null;
  var s = String(str).trim().replace(/[.\-]/g,"/");
  var m = s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if(m){ return new Date(+m[1], +m[2]-1, +m[3]); }
  m = s.match(/(\d{1,2})\/(\d{1,2})/);
  if(m){
    var now = new Date();
    return new Date(now.getFullYear(), +m[1]-1, +m[2]);
  }
  return null;
}

function daysUntil(str){
  var d = parseDate(str);
  if(!d) return null;
  var today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function nextBadge(str){
  var n = daysUntil(str);
  if(n===null || n<0 || n>7) return "";
  var cls, label;
  if(n===0){ cls="nb0"; label="当日"; }
  else if(n===1){ cls="nb1"; label="前日"; }
  else if(n<=3){ cls="nb3"; label="3日前"; }
  else { cls="nb7"; label="7日前"; }
  return '<span class="nb '+cls+'">'+label+'</span>';
}

  var missCount = FULL_DETAIL.filter(function(f){
    if(f[3]) return false;
    var v=o[f[0]]; return !(v!=null && String(v).trim()!=="");
  }).length;
  var missBadge = missCount ? '<span class="miss-badge">空欄 '+missCount+'</span>' : "";
  return '<details class="det"><summary>詳細を表示'+missBadge+'</summary>'
    + '<div class="det-body"><div class="fields">'+rows+'</div></div></details>';
}

function cardHTML(o){
  var cat = o["カテゴリー"]||"";
  var name = o["名前(あだ名)"]||"(名前なし)";
  var top = '<div class="card-top">'
    + '<span class="cbadge '+esc(cat)+'">'+esc(cat)+'</span>'
    + '<span class="name">'+esc(name)+'</span>'
    + (o["ステータス"] ? '<span class="pill p-status">'+esc(o["ステータス"])+'</span>' : "")
    + sexPill(o["性別"])
    + nextBadge(o["次会う日"])
    + '</div>';

  var action = "";
  if(o["アクション日"] || o["アクション内容"]){
    action = '<div class="hl hl-action">'
      + '<span class="hl-label">アクション</span>'
      + (o["アクション日"] ? '<span class="hl-date">'+esc(o["アクション日"])+'</span>' : "")
      + (o["アクション内容"] ? '<span class="hl-what">'+esc(o["アクション内容"])+'</span>' : "")
      + '</div>';
  }
  var next = "";
  if(o["次会う日"] || o["次会う日にする事"]){
    next = '<div class="hl hl-next">'
      + '<span class="hl-label">次会う</span>'
      + (o["次会う日"] ? '<span class="hl-date">'+esc(o["次会う日"])+'</span>' : "")
      + (o["次会う日にする事"] ? '<span class="hl-what">'+esc(o["次会う日にする事"])+'</span>' : "")
      + '</div>';
  }
  var memo = o["メモ"] ? '<div class="memo">'+esc(o["メモ"])+'</div>' : "";

  return '<div class="card">'+top+action+next+memo+detailHTML(o)+'</div>';
}

function checkedCats(){
  var s = {};
  document.querySelectorAll("#catfilter input:checked").forEach(function(c){ s[c.value]=true; });
  return s;
}

function sortByDate(list, key){
  return list.slice().sort(function(a,b){
    var da=daysUntil(a[key]), db=daysUntil(b[key]);
    var va = (da===null)?Infinity:da;
    var vb = (db===null)?Infinity:db;
    return va-vb;
  });
}

function render(){
  var app = document.getElementById("app");
  var cats = checkedCats();
  var list = DATA.filter(function(o){ return cats[o["カテゴリー"]] && matchSearch(o); });

  if(list.length===0){
    app.innerHTML = '<div class="empty">該当する人がいません</div>';
    updateFoot(0);
    return;
  }

  if(SORT==="action" || SORT==="next"){
    var key = SORT==="action" ? "アクション日" : "次会う日";
    var sorted = sortByDate(list, key);
    app.innerHTML = '<div class="cat"><div class="cat-body">'
      + sorted.map(cardHTML).join("") + '</div></div>';
  } else {
    var html = "";
    CATS.forEach(function(c){
      if(!cats[c]) return;
      var group = list.filter(function(o){ return o["カテゴリー"]===c; });
      if(group.length===0) return;
      var meta = CAT_META[c] || { label:c, desc:"" };
      html += '<div class="cat '+c+'">'
        + '<div class="cat-head">'
        + '<span class="chev">▶</span>'
        + '<span class="cbadge '+c+'">'+esc(meta.label||c)+'</span>'
        + '<span class="cat-title">'+esc(meta.desc||("カテゴリ "+c))+'</span>'
        + '<span class="cat-count">'+group.length+' 人</span>'
        + '</div>'
        + '<div class="cat-body">'+group.map(cardHTML).join("")+'</div>'
        + '</div>';
    });
    app.innerHTML = html;
    document.querySelectorAll(".cat-head").forEach(function(h){
      h.addEventListener("click", function(e){
        if(e.target.closest("a")) return;
        this.parentElement.classList.toggle("collapsed");
      });
    });
  }
  updateFoot(list.length);
}

function updateFoot(n){
  document.getElementById("foot").textContent = "表示中 " + n + " 件 ／ 全 " + DATA.length + " 件";
}

document.getElementById("search").addEventListener("input", function(){
  SEARCH = this.value.trim().toLowerCase(); render();
});
document.getElementById("sort").addEventListener("change", function(){
  SORT = this.value; render();
});
document.querySelectorAll("#catfilter input").forEach(function(c){
  c.addEventListener("change", render);
});

renderEvents();
render();
</script>
<script>
(function(){
  var gate=document.getElementById("lockgate");
  var inp=document.getElementById("lg-pass");
  var btn=document.getElementById("lg-btn");
  var err=document.getElementById("lg-err");
  function b64d(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
  async function tryDecrypt(){
    err.style.display="none";
    var pass=inp.value;
    try{
      var salt=b64d(ENC.salt), iv=b64d(ENC.iv), ct=b64d(ENC.ct);
      var keyMat=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
      var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:ENC.it,hash:"SHA-256"},keyMat,{name:"AES-GCM",length:256},false,["decrypt"]);
      var ptBuf=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
      DATA=JSON.parse(new TextDecoder().decode(ptBuf));
      gate.style.display="none";
      renderEvents(); render();
    }catch(e){ err.style.display="block"; }
  }
  btn.addEventListener("click",tryDecrypt);
  inp.addEventListener("keydown",function(e){ if(e.key==="Enter") tryDecrypt(); });
  inp.focus();
})();
</script>
